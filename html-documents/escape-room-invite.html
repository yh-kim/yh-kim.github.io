<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>방탈출 초대장</title>
  <meta name="description" content="함께 갈 방탈출 테마 초대장">
  <style>
    :root {
      --bg: #070911;
      --card: rgba(12, 16, 28, .9);
      --card-2: rgba(18, 23, 38, .94);
      --ink: #fff8ec;
      --muted: #b9bfcd;
      --line: rgba(255, 255, 255, .14);
      --gold: #ffc84f;
      --pink: #ff4d8f;
      --cyan: #39d6ff;
      --shadow: 0 28px 80px rgba(0, 0, 0, .42);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      line-height: 1.55;
      background: var(--bg);
    }

    .page {
      min-height: 100svh;
      position: relative;
      display: grid;
      place-items: start center;
      isolation: isolate;
      padding: 8px;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image: var(--poster-url);
      background-size: cover;
      background-position: center;
      filter: blur(22px) saturate(1.12) brightness(.46);
      transform: scale(1.12);
    }

    .page::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(180deg, rgba(255, 77, 143, .15), rgba(57, 214, 255, .08) 48%, rgba(7, 9, 17, .95)),
        linear-gradient(90deg, rgba(7, 9, 17, .94), rgba(7, 9, 17, .56), rgba(7, 9, 17, .94));
    }

    .invite {
      width: min(100%, 520px);
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255, 255, 255, .18);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .header {
      padding: 10px 14px;
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 200, 79, .26), transparent 34%),
        linear-gradient(135deg, rgba(255, 77, 143, .24), rgba(57, 214, 255, .13));
      border-bottom: 1px solid rgba(255, 255, 255, .13);
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      color: var(--gold);
      font-size: 11px;
      font-weight: 900;
    }

    .spark {
      width: 8px;
      height: 8px;
      flex: 0 0 8px;
      background: var(--gold);
      transform: rotate(45deg);
      box-shadow: 0 0 18px rgba(255, 200, 79, .82);
    }

    h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.16;
      letter-spacing: 0;
      word-break: keep-all;
      text-wrap: balance;
    }

    .poster {
      position: relative;
      width: 100%;
      min-width: 0;
      min-height: 0;
      height: 100%;
      max-width: 100%;
      margin: 0;
      display: grid;
      place-items: center;
      align-self: stretch;
      overflow: hidden;
      background: #111;
      contain: paint;
    }

    .poster img {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      object-position: center;
      background: #111;
    }

    .media-row {
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(0, .72fr);
      gap: 1px;
      align-items: stretch;
      overflow: hidden;
      background: rgba(255, 255, 255, .12);
    }

    .side-summary {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: grid;
      grid-template-rows: 1.16fr .92fr .92fr;
      gap: 8px;
      padding: 8px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .07), rgba(255, 255, 255, .025)),
        linear-gradient(135deg, rgba(255, 77, 143, .2), rgba(57, 214, 255, .12));
    }

    .summary-box {
      position: relative;
      min-width: 0;
      min-height: 76px;
      overflow: hidden;
      padding: 13px 12px 13px 15px;
      display: grid;
      align-content: center;
      border: 1px solid rgba(255, 255, 255, .16);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, .11), rgba(255, 255, 255, .035)),
        rgba(8, 11, 20, .82);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .12),
        0 10px 24px rgba(0, 0, 0, .18);
    }

    .summary-box::before {
      content: "";
      position: absolute;
      top: 12px;
      bottom: 12px;
      left: 0;
      width: 3px;
      border-radius: 0 99px 99px 0;
      background: linear-gradient(180deg, var(--gold), var(--pink));
      opacity: .95;
    }

    .summary-label {
      display: block;
      color: rgba(255, 248, 236, .64);
      font-size: 11px;
      font-weight: 900;
    }

    .summary-box strong {
      display: block;
      margin-top: 6px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
      line-height: 1.24;
      overflow-wrap: anywhere;
    }

    .summary-box strong span {
      display: block;
    }

    .date-line {
      color: rgba(255, 248, 236, .78);
      font-size: 13px;
      font-weight: 800;
    }

    .time-line {
      margin-top: 3px;
      color: var(--ink);
      font-size: 15px;
      font-weight: 950;
    }

    .title-box {
      min-height: 92px;
      background:
        linear-gradient(145deg, rgba(255, 200, 79, .2), rgba(255, 77, 143, .12) 48%, rgba(57, 214, 255, .08)),
        rgba(8, 11, 20, .84);
    }

    .title-box::before {
      background: linear-gradient(180deg, var(--gold), #ff9960);
    }

    .title-box .summary-label {
      color: var(--gold);
    }

    .title-box h1 {
      margin-top: 6px;
      text-shadow: 0 8px 24px rgba(0, 0, 0, .28);
    }

    .title-store {
      margin: 8px 0 0;
      color: rgba(255, 248, 236, .72);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.3;
      word-break: keep-all;
    }

    .summary-box.area {
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      align-content: center;
    }

    .summary-box.area .summary-label,
    .summary-box.area strong {
      grid-column: 1;
    }

    .summary-box.area .map-button {
      grid-column: 2;
      grid-row: 1 / 3;
      align-self: center;
    }

    .facts {
      display: grid;
      gap: 1px;
      background: rgba(255, 255, 255, .1);
    }

    .facts-row {
      display: grid;
      gap: 1px;
    }

    .facts-row.two {
      grid-template-columns: 1fr 1fr;
    }

    .facts-row.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .fact {
      min-height: 68px;
      padding: 11px 13px;
      background: rgba(8, 11, 20, .9);
    }

    .fact b {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .fact strong {
      display: block;
      color: var(--ink);
      font-size: 16px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .map-button {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 1px solid rgba(255, 200, 79, .58);
      border-radius: 8px;
      color: #1a1004;
      background: linear-gradient(135deg, var(--gold), #ff9960);
      text-decoration: none;
      box-shadow: 0 10px 22px rgba(255, 153, 96, .22);
    }

    .map-button svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .map-button:focus-visible {
      outline: 3px solid rgba(57, 214, 255, .72);
      outline-offset: 3px;
    }

    .intro {
      padding: 15px 16px 17px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .05), rgba(255, 255, 255, .025)),
        var(--card-2);
    }

    .intro b {
      display: block;
      margin-bottom: 8px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 900;
    }

    .intro p {
      margin: 0;
      color: #eee6db;
      font-size: 15px;
      white-space: pre-line;
    }

    @media (min-width: 900px) {
      .page {
        padding: 12px;
      }

      .invite {
        width: min(100%, 520px);
      }
    }

    @media (max-width: 520px) {
      .media-row {
        grid-template-columns: minmax(0, .88fr) minmax(0, .72fr);
      }

      .side-summary {
        gap: 6px;
        padding: 6px;
      }

      .summary-box {
        min-height: 70px;
        padding: 10px 9px 10px 12px;
      }

      .title-box {
        min-height: 88px;
      }

      h1 {
        font-size: 16px;
      }

      .title-store {
        margin-top: 6px;
        font-size: 11px;
      }

      .date-line {
        font-size: 12px;
      }

      .time-line {
        font-size: 13px;
      }

      .summary-box strong {
        font-size: 14px;
      }
    }

    @media (max-width: 380px) {
      .page {
        padding: 8px;
      }

      .header,
      .intro {
        padding-left: 14px;
        padding-right: 14px;
      }

      .fact {
        padding-left: 12px;
        padding-right: 12px;
      }

      .media-row {
        grid-template-columns: minmax(0, .92fr) minmax(0, .68fr);
      }

      .summary-box {
        min-height: 66px;
        padding: 8px 8px 8px 11px;
      }

      .title-box {
        min-height: 84px;
      }

      h1 {
        font-size: 15px;
      }

      .title-store {
        font-size: 10px;
      }

      .summary-box strong {
        font-size: 13px;
      }

      .summary-label {
        font-size: 10px;
      }

      .date-line {
        font-size: 11px;
      }

      .time-line {
        font-size: 12px;
      }

      .map-button {
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>

<body>
  <script>
    const inviteData = {
      label: "방탈출 초대장",
      title: "붐붐 박사의 폭죽놀이 유토피아",
      store: "채널27 버터플라이점",
      area: "홍대",
      reservedDate: "6월 3일 수요일",
      reservedTime: "17:40",
      playMinutes: 80,
      genre: "코믹 / 어드벤처",
      difficulty: "쉬움 ~ 보통",
      fear: "거의 없음",
      activity: "보통",
      price: "1인 33,000원",
      description: "먼 옛날, 사람들의 마음은 저 밤하늘처럼 어둠으로 가득 차 있었어요.\n그 모습을 안타깝게 여기신 붐붐박사님께선 이렇게 말씀하셨죠.\n\n“붐 붐...”\n폭죽을 터뜨리자!",
      posterUrl: "./escape-room-invite-assets/poster.jpg",
      mapUrl: "https://map.naver.com/p/search/%EC%B1%84%EB%84%9027%20%EB%B2%84%ED%84%B0%ED%94%8C%EB%9D%BC%EC%9D%B4%EC%A0%90"
    };
  </script>

  <main class="page">
    <article class="invite" aria-label="방탈출 초대장">
      <header class="header">
        <p class="label"><span class="spark" aria-hidden="true"></span><span data-field="label"></span></p>
      </header>

      <section class="media-row" aria-label="포스터와 주요 정보">
        <figure class="poster">
          <img data-image="posterUrl" src="" alt="">
        </figure>

        <div class="side-summary">
          <section class="summary-box title-box" aria-label="테마 이름">
            <span class="summary-label">테마</span>
            <h1 data-field="title"></h1>
            <p class="title-store" data-field="store"></p>
          </section>

          <section class="summary-box" aria-label="예약 시간">
            <span class="summary-label">예약 시간</span>
            <strong><span class="date-line" data-field="reservedDate"></span><span class="time-line" data-time-range></span></strong>
          </section>

          <section class="summary-box area" aria-label="지역">
            <span class="summary-label">지역</span>
            <strong data-field="area"></strong>
            <a class="map-button" data-link="mapUrl" href="#" aria-label="네이버 지도 열기" title="네이버 지도 열기">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"></path>
                <circle cx="12" cy="10" r="2.5"></circle>
              </svg>
            </a>
          </section>
        </div>
      </section>

      <section class="facts" aria-label="테마 정보">
        <div class="facts-row two">
          <div class="fact">
            <b>장르</b>
            <strong data-field="genre"></strong>
          </div>
          <div class="fact">
            <b>가격</b>
            <strong data-field="price"></strong>
          </div>
        </div>
        <div class="facts-row three">
          <div class="fact">
            <b>난이도</b>
            <strong data-field="difficulty"></strong>
          </div>
          <div class="fact">
            <b>공포도</b>
            <strong data-field="fear"></strong>
          </div>
          <div class="fact">
            <b>활동성</b>
            <strong data-field="activity"></strong>
          </div>
        </div>
      </section>

      <section class="intro" aria-label="테마 소개">
        <b>테마 소개</b>
        <p data-field="description"></p>
      </section>
    </article>
  </main>

  <script>
    document.title = inviteData.label;
    document.documentElement.style.setProperty("--poster-url", `url("${inviteData.posterUrl}")`);

    document.querySelectorAll("[data-field]").forEach((node) => {
      const key = node.dataset.field;
      node.textContent = inviteData[key] || "";
    });

    document.querySelectorAll("[data-image]").forEach((node) => {
      const key = node.dataset.image;
      node.src = inviteData[key] || "";
      node.alt = `${inviteData.title} 포스터`;
    });

    document.querySelectorAll("[data-link]").forEach((node) => {
      const key = node.dataset.link;
      node.href = inviteData[key] || "#";
    });

    document.querySelectorAll("[data-time-range]").forEach((node) => {
      const [hour, minute] = inviteData.reservedTime.split(":").map(Number);
      const start = hour * 60 + minute;
      const end = start + inviteData.playMinutes;
      const format = (value) => {
        const dayMinutes = ((value % 1440) + 1440) % 1440;
        return `${String(Math.floor(dayMinutes / 60)).padStart(2, "0")}:${String(dayMinutes % 60).padStart(2, "0")}`;
      };
      node.textContent = `${format(start)} - ${format(end)} (${inviteData.playMinutes}분)`;
    });
  </script>
</body>

</html>
