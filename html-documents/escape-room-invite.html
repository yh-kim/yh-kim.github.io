<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>방탈출 정보 목록</title>
  <meta name="description" content="방탈출 테마 카드 목록">
  <link rel="shortcut icon" href="/img/favicon.ico">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Pimi's Blog">
  <meta property="og:title" content="방탈출 정보 목록">
  <meta property="og:description" content="방탈출 테마 카드 목록">
  <meta property="og:url" content="https://blog.pickth.com/html-documents/escape-room-invite.html">
  <meta property="og:image" content="https://blog.pickth.com/img/og-image.png">
  <meta property="og:image:secure_url" content="https://blog.pickth.com/img/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:image:alt" content="Pimi's Blog space icon">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="방탈출 정보 목록">
  <meta name="twitter:description" content="방탈출 테마 카드 목록">
  <meta name="twitter:image" content="https://blog.pickth.com/img/og-image.png">
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #17191f;
      --html-doc-top-bg: rgba(255, 248, 237, .9);
      --html-doc-top-color: #252330;
      --html-doc-top-border: 1px solid rgba(255, 248, 237, .45);
      --html-doc-top-shadow: 0 14px 34px rgba(0, 0, 0, .32);
      --html-doc-top-focus: rgba(255, 248, 237, .38);
    }

    body {
      min-height: 100%;
      margin: 0;
      color: #252330;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      background: #17191f;
    }

    .page {
      min-height: 100svh;
      display: grid;
      place-items: start center;
      padding: 20px 12px;
    }

    .list-shell {
      width: min(100%, 540px);
    }

    .hero {
      margin-bottom: 16px;
      color: #fff8ed;
    }

    .hero h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .hero p {
      margin: 8px 0 0;
      color: rgba(255, 248, 237, .72);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
      word-break: keep-all;
    }

    .card-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
    }

    .escape-card-link {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      align-items: center;
      gap: 11px;
      min-height: 122px;
      padding: 12px;
      border: 1px solid rgba(255, 248, 237, .62);
      border-radius: 18px;
      color: inherit;
      background: #fff8ed;
      box-shadow: 0 16px 38px rgba(0, 0, 0, .2);
      text-decoration: none;
      overflow: hidden;
    }

    .poster {
      aspect-ratio: 2 / 3;
      align-self: center;
      overflow: hidden;
      border: 1px solid rgba(48, 42, 51, .12);
      border-radius: 14px;
      background: #111;
      box-shadow: 0 10px 22px rgba(65, 41, 27, .16);
    }

    .poster img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    .poster.square {
      aspect-ratio: 1 / 1;
    }

    .summary {
      min-width: 0;
      display: grid;
      align-content: center;
      gap: 7px;
      padding: 2px 0;
    }

    .summary h2 {
      margin: 0;
      color: #252330;
      font-size: 15px;
      line-height: 1.18;
      letter-spacing: 0;
      word-break: keep-all;
    }

    .store {
      margin: 0;
      color: #6f6973;
      font-size: 12px;
      font-weight: 800;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 23px;
      padding: 6px 7px;
      border: 1px solid rgba(48, 42, 51, .1);
      border-radius: 999px;
      color: #34313d;
      background: rgba(255, 255, 255, .72);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .badge.time {
      color: #7d5220;
      background: #fff4df;
      border-color: rgba(213, 168, 79, .28);
    }

    .badge.area {
      color: #355f57;
      background: #eaf5f1;
      border-color: rgba(110, 169, 155, .28);
    }

    @media (max-width: 380px) {
      .card-list {
        grid-template-columns: 1fr;
      }

      .escape-card-link {
        grid-template-columns: 84px minmax(0, 1fr);
        align-items: center;
        gap: 11px;
        padding: 10px;
      }

      .summary h2 {
        font-size: 17px;
      }

      .badge {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="list-shell">
      <header class="hero">
        <h1>방탈출 정보</h1>
        <p>방탈출 테마 카드를 모아두는 곳</p>
      </header>

      <section class="card-list" aria-label="방탈출 카드 목록">
        <a class="escape-card-link" href="./escape-room-invite-card/5.html" data-reserved-date="2026-06-15">
          <span class="poster">
            <img src="./escape-room-invite-card/assets/poster-5.jpg" alt="퀘스천마크 포스터">
          </span>
          <span class="summary">
            <span>
              <h2>퀘스천마크</h2>
              <p class="store">퀘스천마크</p>
            </span>
            <span class="badges" aria-label="요약 정보">
              <span class="badge area">홍대</span>
              <span class="badge">6월 15일 월요일</span>
              <span class="badge time">20:20 - 21:35</span>
            </span>
          </span>
        </a>

        <a class="escape-card-link" href="./escape-room-invite-card/4.html" data-reserved-date="2026-06-09">
          <span class="poster">
            <img src="./escape-room-invite-card/assets/poster-4.png" alt="Chapter 02 : 쿠키 포스터">
          </span>
          <span class="summary">
            <span>
              <h2>Chapter 02 : 쿠키</h2>
              <p class="store">더챕터</p>
            </span>
            <span class="badges" aria-label="요약 정보">
              <span class="badge area">홍대</span>
              <span class="badge">6월 9일 화요일</span>
              <span class="badge time">19:20 - 20:30</span>
            </span>
          </span>
        </a>

        <a class="escape-card-link" href="./escape-room-invite-card/2.html" data-reserved-date="2026-05-24">
          <span class="poster square">
            <img src="./escape-room-invite-card/assets/poster-2.png" alt="머니머니부동산 포스터">
          </span>
          <span class="summary">
            <span>
              <h2>머니머니부동산</h2>
              <p class="store">키이스케이프 강남 스테이션점</p>
            </span>
            <span class="badges" aria-label="요약 정보">
              <span class="badge area">강남</span>
              <span class="badge">5월 24일 일요일</span>
              <span class="badge time">15:50 - 17:10</span>
            </span>
          </span>
        </a>

        <a class="escape-card-link" href="./escape-room-invite-card/3.html" data-reserved-date="2026-04-11">
          <span class="poster">
            <img src="./escape-room-invite-card/assets/poster-3.png" alt="alone 포스터">
          </span>
          <span class="summary">
            <span>
              <h2>alone</h2>
              <p class="store">지구별 방탈출 홍대라스트시티점</p>
            </span>
            <span class="badges" aria-label="요약 정보">
              <span class="badge area">홍대</span>
              <span class="badge">4월 11일 토요일</span>
              <span class="badge time">17:00 - 18:05</span>
            </span>
          </span>
        </a>

        <a class="escape-card-link" href="./escape-room-invite-card/1.html" data-reserved-date="2026-06-03">
          <span class="poster">
            <img src="./escape-room-invite-card/assets/poster-1.jpg" alt="붐붐 박사의 폭죽놀이 유토피아 포스터">
          </span>
          <span class="summary">
            <span>
              <h2>붐붐 박사의 폭죽놀이 유토피아</h2>
              <p class="store">채널27 버터플라이점</p>
            </span>
            <span class="badges" aria-label="요약 정보">
              <span class="badge area">홍대</span>
              <span class="badge">6월 3일 수요일</span>
              <span class="badge time">17:40 - 19:00</span>
            </span>
          </span>
        </a>
      </section>
    </div>
  </main>
  <script>
    document.querySelectorAll(".card-list").forEach((list) => {
      const cards = Array.from(list.querySelectorAll("[data-reserved-date]"));
      cards
        .sort((a, b) => b.dataset.reservedDate.localeCompare(a.dataset.reservedDate))
        .forEach((card) => list.append(card));
    });
  </script>
  <script src="/js/html-document-scroll.js"></script>
</body>

</html>
