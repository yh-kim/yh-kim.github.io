<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>방탈출 정보</title>
  <meta name="description" content="함께 갈 방탈출 테마 정보">
  <style>
    :root {
      --bg: #11131a;
      --paper: #f6efe4;
      --paper-soft: #fffaf2;
      --paper-warm: #e8dcc7;
      --ink: #fff8eb;
      --paper-ink: #242532;
      --muted: #746f78;
      --line: rgba(44, 38, 35, .14);
      --accent: #c06d42;
      --accent-deep: #75432b;
      --sage: #65877e;
      --night: #202230;
      --shadow: 0 26px 70px rgba(0, 0, 0, .32);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      line-height: 1.55;
      background: var(--bg);
    }

    .page {
      min-height: 100svh;
      position: relative;
      display: grid;
      place-items: start center;
      isolation: isolate;
      padding: 8px;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image: var(--poster-url);
      background-size: cover;
      background-position: center;
      filter: blur(22px) saturate(1.12) brightness(.46);
      transform: scale(1.12);
    }

    .page::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background: rgba(13, 14, 24, .72);
      box-shadow: inset 0 -30vh 80vh rgba(16, 17, 26, .55);
    }

    .invite-shell {
      width: min(100%, 500px);
    }

    .invite {
      width: 100%;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(246, 239, 228, .66);
      border-radius: 20px;
      overflow: hidden;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .header {
      padding: 13px 15px 15px;
      background: var(--night);
      border-bottom: 1px solid rgba(246, 239, 228, .16);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .14);
    }

    .section-label::before {
      width: 8px;
      height: 8px;
      flex: 0 0 8px;
      background: var(--accent);
      transform: rotate(45deg);
      box-shadow: 0 0 14px rgba(192, 109, 66, .38);
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--accent-deep);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .section-label::before {
      content: "";
      width: 6px;
      height: 6px;
      flex-basis: 6px;
      opacity: .9;
    }

    .header-title {
      margin: 0;
      color: #fff8ec;
      font-size: 22px;
      line-height: 1.16;
      letter-spacing: 0;
      word-break: keep-all;
      text-wrap: balance;
      text-shadow: 0 10px 24px rgba(0, 0, 0, .24);
    }

    .header-store {
      margin: 7px 0 0;
      color: rgba(255, 248, 236, .72);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.3;
      word-break: keep-all;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .header-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .meta-badge {
      align-items: center;
      gap: 4px;
      display: inline-flex;
      width: fit-content;
      padding: 5px 10px;
      border: 1px solid rgba(246, 239, 228, .18);
      border-radius: 999px;
      color: #f3dbc0;
      background: rgba(246, 239, 228, .08);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .meta-location {
      padding: 3px 5px 3px 10px;
      text-decoration: none;
    }

    .meta-location svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .stat-pill {
      --stat-bg: rgba(246, 239, 228, .08);
      --stat-border: rgba(246, 239, 228, .18);
      --stat-label: rgba(255, 248, 235, .68);
      --stat-value: #f3dbc0;
      display: inline-flex;
      overflow: hidden;
      border: 1px solid var(--stat-border);
      border-radius: 999px;
      color: var(--stat-value);
      background: var(--stat-bg);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .stat-pill span {
      padding: 5px 7px;
      color: var(--stat-label);
      border-right: 1px solid var(--stat-border);
    }

    .stat-pill strong {
      padding: 5px 8px;
      font-weight: 950;
    }

    .stat-low {
      --stat-bg: rgba(101, 135, 126, .16);
      --stat-border: rgba(143, 181, 169, .34);
      --stat-label: rgba(218, 235, 230, .72);
      --stat-value: #e0f1ec;
    }

    .stat-mid {
      --stat-bg: rgba(192, 109, 66, .16);
      --stat-border: rgba(220, 146, 92, .34);
      --stat-label: rgba(246, 221, 199, .76);
      --stat-value: #ffe1c8;
    }

    .stat-high {
      --stat-bg: rgba(183, 72, 65, .2);
      --stat-border: rgba(218, 104, 94, .38);
      --stat-label: rgba(255, 219, 216, .76);
      --stat-value: #ffd3ce;
    }

    .stat-none {
      --stat-bg: rgba(120, 130, 148, .14);
      --stat-border: rgba(162, 170, 184, .28);
      --stat-label: rgba(226, 231, 239, .68);
      --stat-value: #e7edf5;
    }

    .poster-intro {
      display: grid;
      grid-template-columns: minmax(170px, 1.22fr) minmax(0, .78fr);
      gap: 1px;
      background: var(--line);
    }

    .poster-panel {
      min-width: 0;
      margin: 0;
      padding: 12px;
      display: grid;
      align-content: center;
      background: var(--paper-warm);
    }

    .poster-frame {
      aspect-ratio: 2 / 3;
      width: 100%;
      height: auto;
      max-height: 430px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid rgba(73, 54, 40, .14);
      border-radius: 14px;
      background: #111;
      box-shadow:
        0 0 0 5px rgba(255, 255, 255, .66),
        0 18px 42px rgba(65, 41, 27, .22);
    }

    .poster-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .intro-panel {
      min-width: 0;
      padding: 3px 13px 9px;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 4px;
      align-content: stretch;
      background: var(--paper-soft);
    }

    .intro-panel p {
      margin: 5px 0 0;
      color: #4f4959;
      font-size: 11px;
      line-height: 1.42;
      max-height: 164px;
      overflow: hidden;
      white-space: pre-line;
      word-break: keep-all;
    }

    .info-grid {
      display: grid;
      gap: 1px;
      background: var(--line);
    }

    .info-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .info-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .info-cell {
      position: relative;
      min-width: 0;
      min-height: 76px;
      padding: 13px 14px;
      display: grid;
      align-content: center;
      background: var(--paper-soft);
    }

    .info-cell:nth-child(even) {
      background: #f2e8d8;
    }

    .info-label {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 7px;
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--accent-deep);
      background: rgba(192, 109, 66, .12);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .info-value {
      display: block;
      color: var(--paper-ink);
      font-size: 16px;
      font-weight: 900;
      line-height: 1.22;
      overflow-wrap: anywhere;
    }

    .date-line {
      color: #786f78;
      font-size: 12px;
      font-weight: 800;
    }

    .time-line {
      display: block;
      margin-top: 2px;
      color: var(--paper-ink);
      font-size: 16px;
      font-weight: 950;
      white-space: nowrap;
    }

    .intro-reservation {
      min-width: 0;
      padding-top: 3px;
      border-top: 1px solid var(--line);
    }

    .intro-reservation .section-label {
      margin-bottom: 5px;
    }

    .intro-reservation .time-line {
      font-size: 14px;
    }

    .week-calendar {
      width: min(100%, 112px);
      margin-top: 7px;
      padding: 7px 8px;
      border: 1px solid rgba(36, 37, 50, .12);
      border-radius: 10px;
    }

    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      align-items: center;
    }

    .week-row + .week-row {
      margin-top: 6px;
    }

    .week-dot {
      position: relative;
      width: 8px;
      height: 8px;
      margin: 0 auto;
      border: 2px solid transparent;
      border-radius: 999px;
      background: rgba(36, 37, 50, .2);
    }

    .week-dot.is-sunday {
      background: #d94f45;
    }

    .week-dot.is-saturday {
      background: #3478f6;
    }

    .week-dot.today {
      border-color: #3478f6;
      background: #fffdf8;
    }

    .week-dot.event {
      border-color: #d94f45;
      background: #fffdf8;
    }

    .week-dot.today.event {
      border-color: #d94f45;
      background: #3478f6;
    }

    .compact-cell {
      min-height: 68px;
    }

    .compact-cell .info-value {
      font-size: 15px;
    }

    .meta-location:focus-visible {
      outline: 3px solid rgba(244, 135, 154, .38);
      outline-offset: 3px;
    }

    .action-dock {
      display: flex;
      justify-content: flex-end;
      gap: 9px;
      margin-top: 10px;
      padding-right: 4px;
    }

    .action-button {
      width: 44px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(246, 239, 228, .22);
      border-radius: 999px;
      color: #f3dbc0;
      background: rgba(32, 34, 48, .86);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .1),
        0 12px 24px rgba(0, 0, 0, .2);
      cursor: pointer;
    }

    .action-button svg {
      width: 19px;
      height: 19px;
      display: block;
    }

    .action-button:focus-visible {
      outline: 3px solid rgba(244, 135, 154, .38);
      outline-offset: 3px;
    }

    .action-button.is-done {
      color: #e0f1ec;
      border-color: rgba(143, 181, 169, .42);
    }

    @media (min-width: 900px) {
      .page {
        padding: 12px;
      }

      .invite-shell {
        width: min(100%, 500px);
      }
    }

  </style>
</head>

<body>
  <script>
    const inviteData = {
      label: "방탈출 정보",
      title: "붐붐 박사의 폭죽놀이 유토피아",
      store: "채널27 버터플라이점",
      area: "홍대",
      reservedDate: "6월 3일 수요일",
      reservedTime: "17:40",
      playMinutes: 80,
      genre: "코믹/어드벤처",
      difficulty: "쉬움 ~ 보통",
      fear: "거의 없음",
      activity: "보통",
      price: "33,000원",
      description: "먼 옛날, 사람들의 마음은 저 밤하늘처럼 어둠으로 가득 차 있었어요.\n그 모습을 안타깝게 여기신 붐붐박사님께선 이렇게 말씀하셨죠.\n\n“붐 붐...”\n폭죽을 터뜨리자!",
      posterUrl: "./escape-room-invite-assets/poster.jpg",
      mapUrl: "https://map.naver.com/p/search/%EC%B1%84%EB%84%9027%20%EB%B2%84%ED%84%B0%ED%94%8C%EB%9D%BC%EC%9D%B4%EC%A0%90"
    };
  </script>

  <main class="page">
    <div class="invite-shell">
      <article class="invite" aria-label="방탈출 정보">
        <header class="header">
          <h1 class="header-title" data-field="title"></h1>
          <p class="header-store" data-field="store"></p>
          <div class="header-meta" aria-label="테마 요약">
            <span class="meta-badge" data-field="genre"></span>
            <span class="meta-badge" data-play-minutes></span>
            <span class="meta-badge" data-field="price"></span>
            <a class="meta-badge meta-location" data-link="mapUrl" href="#" target="_blank" rel="noopener noreferrer" aria-label="네이버 지도 열기" title="네이버 지도 열기">
              <span data-field="area"></span>
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"></path>
                <circle cx="12" cy="10" r="2.5"></circle>
              </svg>
            </a>
          </div>
          <div class="header-stats" data-stat-pills aria-label="난이도 공포도 활동성"></div>
        </header>

        <section class="poster-intro" aria-label="포스터와 테마 소개">
          <figure class="poster-panel">
            <div class="poster-frame">
              <img data-image="posterUrl" src="" alt="">
            </div>
          </figure>

          <section class="intro-panel">
            <div class="intro-copy">
              <span class="section-label">테마 소개</span>
              <p data-field="description"></p>
            </div>
            <div class="intro-reservation">
              <span class="section-label">예약 시간</span>
              <strong class="info-value"><span class="date-line" data-field="reservedDate"></span><span class="time-line" data-time-range></span></strong>
              <div class="week-calendar" data-week-calendar aria-label="오늘 주부터 예약 당일까지"></div>
            </div>
          </section>
        </section>
      </article>

      <div class="action-dock" aria-label="카드 작업">
        <button class="action-button" type="button" data-save-card aria-label="카드를 이미지로 저장" title="카드를 이미지로 저장">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"></path>
            <path d="m7 10 5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
        </button>
        <button class="action-button" type="button" data-copy-info aria-label="방탈출 정보 복사" title="방탈출 정보 복사">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="11" height="11" rx="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <script>
    document.title = inviteData.label;
    document.documentElement.style.setProperty("--poster-url", `url("${inviteData.posterUrl}")`);

    document.querySelectorAll("[data-field]").forEach((node) => {
      const key = node.dataset.field;
      node.textContent = inviteData[key] || "";
    });

    document.querySelectorAll("[data-image]").forEach((node) => {
      const key = node.dataset.image;
      node.src = inviteData[key] || "";
      node.alt = `${inviteData.title} 포스터`;
    });

    document.querySelectorAll("[data-link]").forEach((node) => {
      const key = node.dataset.link;
      node.href = inviteData[key] || "#";
    });

    document.querySelectorAll("[data-time-range]").forEach((node) => {
      const [hour, minute] = inviteData.reservedTime.split(":").map(Number);
      const start = hour * 60 + minute;
      const end = start + inviteData.playMinutes;
      const format = (value) => {
        const dayMinutes = ((value % 1440) + 1440) % 1440;
        return `${String(Math.floor(dayMinutes / 60)).padStart(2, "0")}:${String(dayMinutes % 60).padStart(2, "0")}`;
      };
      node.textContent = `${format(start)} - ${format(end)}`;
    });

    document.querySelectorAll("[data-play-minutes]").forEach((node) => {
      node.textContent = `${inviteData.playMinutes}분`;
    });

    const statTone = (label, value) => {
      const text = String(value || "").replace(/\s/g, "");

      if (text.includes("없음") || text.includes("낮음")) return "stat-none";
      if (text.includes("쉬움") || text.includes("적음")) return "stat-low";
      if (text.includes("보통") || text.includes("중간")) return "stat-mid";
      if (text.includes("높음") || text.includes("어려움") || text.includes("많음")) return "stat-high";
      if (label === "공포도") return "stat-none";
      return "stat-mid";
    };

    const buildStatPill = (label, value) => {
      const pill = document.createElement("span");
      const name = document.createElement("span");
      const text = document.createElement("strong");

      pill.className = `stat-pill ${statTone(label, value)}`;
      name.textContent = label;
      text.textContent = value;
      pill.append(name, text);
      return pill;
    };

    document.querySelectorAll("[data-stat-pills]").forEach((node) => {
      node.replaceChildren(
        buildStatPill("난이도", inviteData.difficulty),
        buildStatPill("공포도", inviteData.fear),
        buildStatPill("활동성", inviteData.activity)
      );
    });

    const atStartOfDay = (date) => new Date(date.getFullYear(), date.getMonth(), date.getDate());

    const addDays = (date, days) => {
      const next = atStartOfDay(date);
      next.setDate(next.getDate() + days);
      return next;
    };

    const isSameDay = (a, b) => (
      a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate()
    );

    const startOfWeek = (date, weekStartsOn = 0) => {
      const start = atStartOfDay(date);
      const diff = (start.getDay() - weekStartsOn + 7) % 7;
      start.setDate(start.getDate() - diff);
      return start;
    };

    const parseKoreanMonthDay = (text, baseYear) => {
      const match = text.match(/(\d+)월\s*(\d+)일/);
      if (!match) return null;
      return new Date(baseYear, Number(match[1]) - 1, Number(match[2]));
    };

    const buildWeekDotCalendar = ({
      todayDate = new Date(),
      eventDate,
      weekStartsOn = 0
    }) => {
      const todayStart = atStartOfDay(todayDate);
      const eventStart = atStartOfDay(eventDate);
      const firstWeek = startOfWeek(todayStart, weekStartsOn);
      const eventWeek = startOfWeek(eventStart, weekStartsOn);
      const weekCount = Math.max(1, Math.round((eventWeek - firstWeek) / (7 * 24 * 60 * 60 * 1000)) + 1);
      const root = document.createElement("div");

      root.className = "week-calendar-inner";

      for (let week = 0; week < weekCount; week += 1) {
        const row = document.createElement("div");
        row.className = "week-row";

        for (let day = 0; day < 7; day += 1) {
          const date = addDays(firstWeek, week * 7 + day);
          const dot = document.createElement("span");
          const isToday = isSameDay(date, todayStart);
          const isEvent = isSameDay(date, eventStart);
          const dayOfWeek = date.getDay();

          dot.className = "week-dot";
          if (dayOfWeek === 0) dot.classList.add("is-sunday");
          if (dayOfWeek === 6) dot.classList.add("is-saturday");
          if (isToday) dot.classList.add("today");
          if (isEvent) dot.classList.add("event");
          dot.setAttribute("aria-label", `${date.getMonth() + 1}월 ${date.getDate()}일${isToday ? " 오늘" : ""}${isEvent ? " 예약 당일" : ""}`);
          row.append(dot);
        }

        root.append(row);
      }

      return root;
    };

    const renderWeekDotCalendar = (selector, options) => {
      document.querySelectorAll(selector).forEach((node) => {
        node.replaceChildren(buildWeekDotCalendar(options));
      });
    };

    const today = new Date();
    const eventDate = parseKoreanMonthDay(inviteData.reservedDate, today.getFullYear());
    if (eventDate && eventDate < atStartOfDay(today)) {
      eventDate.setFullYear(eventDate.getFullYear() + 1);
    }
    if (eventDate) {
      renderWeekDotCalendar("[data-week-calendar]", {
        todayDate: today,
        eventDate,
        weekStartsOn: 0
      });
    }

    const setButtonDone = (button, message) => {
      const originalTitle = button.title;
      button.classList.add("is-done");
      button.title = message;
      setTimeout(() => {
        button.classList.remove("is-done");
        button.title = originalTitle;
      }, 1400);
    };

    const toDataUrl = (blob) => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(blob);
    });

    const inlineInviteImages = async (clone) => {
      const cloneImages = Array.from(clone.querySelectorAll("img"));
      const sourceImages = Array.from(document.querySelectorAll(".invite img"));

      await Promise.all(cloneImages.map(async (image, index) => {
        const source = sourceImages[index];
        const src = source?.currentSrc || source?.src || image.src;
        try {
          const response = await fetch(src);
          const blob = await response.blob();
          image.src = await toDataUrl(blob);
        } catch {
          image.src = src;
        }
      }));
    };

    const saveInviteAsImage = async () => {
      const source = document.querySelector(".invite");
      if (!source) return;

      const rect = source.getBoundingClientRect();
      const width = Math.ceil(rect.width);
      const height = Math.ceil(rect.height);
      const clone = source.cloneNode(true);
      const style = document.querySelector("style")?.textContent || "";

      await inlineInviteImages(clone);

      const html = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
          <foreignObject width="100%" height="100%">
            <div xmlns="http://www.w3.org/1999/xhtml">
              <style>${style}</style>
              ${clone.outerHTML}
            </div>
          </foreignObject>
        </svg>`;
      const svg = new Blob([html], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svg);
      const image = new Image();

      await new Promise((resolve, reject) => {
        image.onload = resolve;
        image.onerror = reject;
        image.src = url;
      });

      const scale = Math.min(2, window.devicePixelRatio || 1);
      const canvas = document.createElement("canvas");
      canvas.width = width * scale;
      canvas.height = height * scale;
      const context = canvas.getContext("2d");
      context.scale(scale, scale);
      context.drawImage(image, 0, 0, width, height);
      URL.revokeObjectURL(url);

      const pngUrl = canvas.toDataURL("image/png");
      const link = document.createElement("a");
      link.download = "escape-room-invite.png";
      link.href = pngUrl;
      link.click();
    };

    const invitationText = () => {
      const time = document.querySelector("[data-time-range]")?.textContent || "";
      const url = window.location.href;
      return [
        `🎆 테마: ${inviteData.title}`,
        `📍 매장: ${inviteData.store} (${inviteData.area})`,
        `🗓️ 예약: ${inviteData.reservedDate} ${time}`,
        `🎭 정보: ${inviteData.genre} · ${inviteData.playMinutes}분 · ${inviteData.price}`,
        `🧩 난이도: ${inviteData.difficulty} / 공포도: ${inviteData.fear} / 활동성: ${inviteData.activity}`,
        "",
        `🔗 카드 보기: ${url}`
      ].join("\n");
    };

    const copyInviteInfo = async () => {
      const text = invitationText();
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.append(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    };

    document.querySelector("[data-save-card]")?.addEventListener("click", async (event) => {
      const button = event.currentTarget;
      try {
        await saveInviteAsImage();
        setButtonDone(button, "저장했어요");
      } catch {
        setButtonDone(button, "저장 실패");
      }
    });

    document.querySelector("[data-copy-info]")?.addEventListener("click", async (event) => {
      const button = event.currentTarget;
      try {
        await copyInviteInfo();
        setButtonDone(button, "복사했어요");
      } catch {
        setButtonDone(button, "복사 실패");
      }
    });
  </script>
</body>

</html>
