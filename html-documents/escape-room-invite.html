<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>방탈출 정보</title>
  <meta name="description" content="함께 갈 방탈출 테마 정보">
  <style>
    :root {
      --bg: #17191f;
      --paper: #fff8ed;
      --paper-soft: #fffdf8;
      --paper-warm: #f1e5d4;
      --ink: #252330;
      --muted: #6f6973;
      --line: rgba(48, 42, 51, .13);
      --line-strong: rgba(48, 42, 51, .2);
      --coral: #e66b58;
      --coral-soft: #fff0ea;
      --mint: #6ea99b;
      --mint-soft: #eaf5f1;
      --gold: #d5a84f;
      --blue: #4d7ed8;
      --shadow: 0 24px 60px rgba(0, 0, 0, .26);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      line-height: 1.5;
      background: var(--bg);
    }

    .page {
      min-height: 100svh;
      position: relative;
      display: grid;
      place-items: start center;
      isolation: isolate;
      padding: 10px;
    }

    .page::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -3;
      background-image: var(--poster-url);
      background-size: cover;
      background-position: center;
      filter: blur(24px) saturate(1.08) brightness(.5);
      transform: scale(1.12);
    }

    .page::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background: rgba(19, 20, 28, .7);
      box-shadow: inset 0 -34vh 80vh rgba(14, 15, 20, .58);
    }

    .invite-shell {
      width: min(100%, 500px);
    }

    .invite {
      width: 100%;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255, 248, 237, .72);
      border-radius: 24px;
      overflow: hidden;
      background: var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .header {
      position: relative;
      padding: 18px 18px 15px;
      color: var(--ink);
      background: var(--paper-soft);
      border-bottom: 1px dashed rgba(48, 42, 51, .2);
    }

    .header::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 5px;
      background: var(--coral);
    }

    .section-label::before {
      width: 5px;
      height: 5px;
      flex: 0 0 5px;
      border-radius: 999px;
      background: var(--coral);
      box-shadow: 0 0 0 2px rgba(230, 107, 88, .1);
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #6a4d3a;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .section-label::before {
      content: "";
      width: 5px;
      height: 5px;
      flex-basis: 5px;
    }

    .header-title {
      margin: 0;
      color: var(--ink);
      font-size: 25px;
      line-height: 1.12;
      letter-spacing: 0;
      word-break: keep-all;
      text-wrap: balance;
    }

    .header-store {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.3;
      word-break: keep-all;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .header-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .meta-badge {
      align-items: center;
      gap: 5px;
      display: inline-flex;
      width: fit-content;
      min-height: 28px;
      padding: 7px 10px;
      border: 1px solid rgba(48, 42, 51, .11);
      border-radius: 999px;
      color: #34313d;
      background: rgba(255, 255, 255, .7);
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 6px 16px rgba(48, 42, 51, .05);
    }

    .meta-location {
      padding: 6px 7px 6px 11px;
      color: #355f57;
      background: var(--mint-soft);
      border-color: rgba(110, 169, 155, .28);
      text-decoration: none;
    }

    .meta-location svg {
      width: 14px;
      height: 14px;
      display: block;
    }

    .stat-pill {
      --stat-bg: rgba(48, 42, 51, .06);
      --stat-border: rgba(48, 42, 51, .1);
      --stat-label: #6c6670;
      --stat-value: #2c2a36;
      display: inline-flex;
      overflow: hidden;
      border: 1px solid var(--stat-border);
      border-radius: 999px;
      color: var(--stat-value);
      background: var(--stat-bg);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      box-shadow: 0 5px 14px rgba(48, 42, 51, .04);
    }

    .stat-pill span {
      padding: 5px 7px;
      color: var(--stat-label);
      border-right: 1px solid var(--stat-border);
    }

    .stat-pill strong {
      padding: 5px 8px;
      font-weight: 950;
    }

    .stat-low {
      --stat-bg: var(--mint-soft);
      --stat-border: rgba(110, 169, 155, .26);
      --stat-label: #587d73;
      --stat-value: #2d6055;
    }

    .stat-mid {
      --stat-bg: #fff4df;
      --stat-border: rgba(213, 168, 79, .32);
      --stat-label: #82652c;
      --stat-value: #6b501d;
    }

    .stat-high {
      --stat-bg: var(--coral-soft);
      --stat-border: rgba(230, 107, 88, .3);
      --stat-label: #a04b3e;
      --stat-value: #833a30;
    }

    .stat-none {
      --stat-bg: #edf3fb;
      --stat-border: rgba(77, 126, 216, .22);
      --stat-label: #5f718f;
      --stat-value: #39598f;
    }

    .poster-intro {
      display: grid;
      grid-template-columns: minmax(200px, 1.25fr) minmax(0, .75fr);
      background: var(--paper);
    }

    .poster-panel {
      min-width: 0;
      margin: 0;
      padding: 10px;
      display: grid;
      align-content: center;
      background: #efe2cf;
      border-right: 1px solid var(--line);
    }

    .poster-frame {
      aspect-ratio: 2 / 3;
      width: 100%;
      height: auto;
      max-height: 430px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid rgba(48, 42, 51, .12);
      border-radius: 18px;
      background: #111;
      box-shadow:
        0 0 0 6px rgba(255, 250, 243, .72),
        0 18px 36px rgba(65, 41, 27, .2);
    }

    .poster-frame img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    .intro-panel {
      min-width: 0;
      padding: 5px 8px 8px;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 8px;
      align-content: stretch;
      background: var(--paper-soft);
    }

    .intro-copy,
    .intro-reservation {
      min-width: 0;
      padding: 0 9px 9px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
    }

    .intro-copy .section-label,
    .intro-reservation .section-label {
      margin-top: 0;
    }

    .intro-panel p {
      margin: 6px 0 0;
      color: #55505b;
      font-size: 10px;
      line-height: 1.45;
      max-height: 146px;
      overflow: hidden;
      white-space: pre-line;
      word-break: keep-all;
    }

    .info-grid {
      display: grid;
      gap: 1px;
      background: var(--line);
    }

    .info-grid.two {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .info-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .info-cell {
      position: relative;
      min-width: 0;
      min-height: 76px;
      padding: 13px 14px;
      display: grid;
      align-content: center;
      background: var(--paper-soft);
    }

    .info-cell:nth-child(even) {
      background: #f2e8d8;
    }

    .info-label {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 7px;
      padding: 4px 8px;
      border-radius: 999px;
      color: #6a4d3a;
      background: rgba(230, 107, 88, .1);
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
    }

    .info-value {
      display: block;
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
      line-height: 1.22;
      overflow-wrap: anywhere;
    }

    .date-line {
      color: #756e78;
      font-size: 11px;
      font-weight: 800;
    }

    .time-line {
      display: block;
      margin-top: 1px;
      color: var(--ink);
      font-size: 14px;
      font-weight: 950;
      white-space: nowrap;
    }

    .intro-reservation {
      background: #fbf7ef;
    }

    .intro-reservation .section-label {
      margin-bottom: 3px;
    }

    .intro-reservation .time-line {
      font-size: 13px;
    }

    .week-calendar {
      width: calc(100% + 8px);
      margin-left: -4px;
      margin-right: -4px;
      margin-top: 5px;
      padding: 5px 4px;
      border: 1px solid rgba(48, 42, 51, .12);
      border-radius: 10px;
      background: rgba(255, 255, 255, .55);
    }

    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 7px);
      justify-content: center;
      gap: 4px;
      align-items: center;
    }

    .week-row + .week-row {
      margin-top: 4px;
    }

    .week-dot {
      position: relative;
      width: 7px;
      height: 7px;
      margin: 0 auto;
      border: 1px solid transparent;
      border-radius: 999px;
      background: rgba(48, 42, 51, .2);
    }

    .week-dot.is-sunday {
      background: var(--coral);
    }

    .week-dot.is-saturday {
      background: var(--blue);
    }

    .week-dot.today {
      border-color: var(--blue);
      background: #ffffff;
    }

    .week-dot.event {
      border-color: var(--coral);
      background: #ffffff;
    }

    .week-dot.today.event {
      border-color: var(--coral);
      background: #ffffff;
    }

    .compact-cell {
      min-height: 68px;
    }

    .compact-cell .info-value {
      font-size: 15px;
    }

    .meta-location:focus-visible {
      outline: 3px solid rgba(244, 135, 154, .38);
      outline-offset: 3px;
    }

    .action-dock {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 11px;
      padding-right: 2px;
    }

    .action-button {
      width: 46px;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 248, 237, .32);
      border-radius: 999px;
      color: #fff7ea;
      background: rgba(37, 35, 48, .88);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .1),
        0 14px 26px rgba(0, 0, 0, .22);
      cursor: pointer;
    }

    .action-button svg {
      width: 19px;
      height: 19px;
      display: block;
    }

    .action-button:focus-visible {
      outline: 3px solid rgba(244, 135, 154, .38);
      outline-offset: 3px;
    }

    .action-button.is-done {
      color: #e8fff7;
      border-color: rgba(110, 169, 155, .5);
      background: rgba(72, 115, 104, .9);
    }

    .snackbar {
      position: fixed;
      right: max(14px, env(safe-area-inset-right));
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 10;
      max-width: calc(100% - 28px);
      padding: 11px 14px;
      border: 1px solid rgba(255, 248, 237, .2);
      border-radius: 999px;
      color: #fff8ed;
      background: rgba(37, 35, 48, .92);
      box-shadow: 0 16px 34px rgba(0, 0, 0, .24);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.2;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .snackbar.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (min-width: 900px) {
      .page {
        padding: 12px;
      }

      .invite-shell {
        width: min(100%, 500px);
      }
    }

  </style>
</head>

<body>
  <script>
    const inviteData = {
      label: "방탈출 정보",
      title: "붐붐 박사의 폭죽놀이 유토피아",
      store: "채널27 버터플라이점",
      area: "홍대",
      reservedDate: "6월 3일 수요일",
      reservedTime: "17:40",
      playMinutes: 80,
      genre: "코믹/어드벤처",
      difficulty: "쉬움 ~ 보통",
      fear: "거의 없음",
      activity: "보통",
      price: "33,000원",
      description: "먼 옛날, 사람들의 마음은 저 밤하늘처럼 어둠으로 가득 차 있었어요.\n그 모습을 안타깝게 여기신 붐붐박사님께선 이렇게 말씀하셨죠.\n\n“붐 붐...”\n폭죽을 터뜨리자!",
      posterUrl: "./escape-room-invite-assets/poster.jpg",
      mapUrl: "https://map.naver.com/p/search/%EC%B1%84%EB%84%9027%20%EB%B2%84%ED%84%B0%ED%94%8C%EB%9D%BC%EC%9D%B4%EC%A0%90"
    };
  </script>

  <main class="page">
    <div class="invite-shell">
      <article class="invite" aria-label="방탈출 정보">
        <header class="header">
          <h1 class="header-title" data-field="title"></h1>
          <p class="header-store" data-field="store"></p>
          <div class="header-meta" aria-label="테마 요약">
            <span class="meta-badge" data-field="genre"></span>
            <span class="meta-badge" data-play-minutes></span>
            <span class="meta-badge" data-field="price"></span>
            <a class="meta-badge meta-location" data-link="mapUrl" href="#" target="_blank" rel="noopener noreferrer" aria-label="네이버 지도 열기" title="네이버 지도 열기">
              <span data-field="area"></span>
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"></path>
                <circle cx="12" cy="10" r="2.5"></circle>
              </svg>
            </a>
          </div>
          <div class="header-stats" data-stat-pills aria-label="난이도 공포도 활동성"></div>
        </header>

        <section class="poster-intro" aria-label="포스터와 테마 소개">
          <figure class="poster-panel">
            <div class="poster-frame">
              <img data-image="posterUrl" src="" alt="">
            </div>
          </figure>

          <section class="intro-panel">
            <div class="intro-copy">
              <span class="section-label">테마 소개</span>
              <p data-field="description"></p>
            </div>
            <div class="intro-reservation">
              <span class="section-label">예약 시간</span>
              <strong class="info-value"><span class="date-line" data-field="reservedDate"></span><span class="time-line" data-time-range></span></strong>
              <div class="week-calendar" data-week-calendar aria-label="오늘 주부터 예약 당일까지"></div>
            </div>
          </section>
        </section>
      </article>

      <div class="action-dock" aria-label="카드 작업">
        <button class="action-button" type="button" data-save-card aria-label="카드를 이미지로 저장" title="카드를 이미지로 저장">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"></path>
            <path d="m7 10 5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
        </button>
        <button class="action-button" type="button" data-copy-info aria-label="방탈출 정보 복사" title="방탈출 정보 복사">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="11" height="11" rx="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <div class="snackbar" role="status" aria-live="polite" data-snackbar></div>

  <script>
    document.title = inviteData.label;
    document.documentElement.style.setProperty("--poster-url", `url("${inviteData.posterUrl}")`);

    document.querySelectorAll("[data-field]").forEach((node) => {
      const key = node.dataset.field;
      node.textContent = inviteData[key] || "";
    });

    document.querySelectorAll("[data-image]").forEach((node) => {
      const key = node.dataset.image;
      node.src = inviteData[key] || "";
      node.alt = `${inviteData.title} 포스터`;
    });

    document.querySelectorAll("[data-link]").forEach((node) => {
      const key = node.dataset.link;
      node.href = inviteData[key] || "#";
    });

    document.querySelectorAll("[data-time-range]").forEach((node) => {
      const [hour, minute] = inviteData.reservedTime.split(":").map(Number);
      const start = hour * 60 + minute;
      const end = start + inviteData.playMinutes;
      const format = (value) => {
        const dayMinutes = ((value % 1440) + 1440) % 1440;
        return `${String(Math.floor(dayMinutes / 60)).padStart(2, "0")}:${String(dayMinutes % 60).padStart(2, "0")}`;
      };
      node.textContent = `${format(start)} - ${format(end)}`;
    });

    document.querySelectorAll("[data-play-minutes]").forEach((node) => {
      node.textContent = `${inviteData.playMinutes}분`;
    });

    const statTone = (label, value) => {
      const text = String(value || "").replace(/\s/g, "");

      if (text.includes("없음") || text.includes("낮음")) return "stat-none";
      if (text.includes("쉬움") || text.includes("적음")) return "stat-low";
      if (text.includes("보통") || text.includes("중간")) return "stat-mid";
      if (text.includes("높음") || text.includes("어려움") || text.includes("많음")) return "stat-high";
      if (label === "공포도") return "stat-none";
      return "stat-mid";
    };

    const buildStatPill = (label, value) => {
      const pill = document.createElement("span");
      const name = document.createElement("span");
      const text = document.createElement("strong");

      pill.className = `stat-pill ${statTone(label, value)}`;
      name.textContent = label;
      text.textContent = value;
      pill.append(name, text);
      return pill;
    };

    document.querySelectorAll("[data-stat-pills]").forEach((node) => {
      node.replaceChildren(
        buildStatPill("난이도", inviteData.difficulty),
        buildStatPill("공포도", inviteData.fear),
        buildStatPill("활동성", inviteData.activity)
      );
    });

    const atStartOfDay = (date) => new Date(date.getFullYear(), date.getMonth(), date.getDate());

    const addDays = (date, days) => {
      const next = atStartOfDay(date);
      next.setDate(next.getDate() + days);
      return next;
    };

    const isSameDay = (a, b) => (
      a.getFullYear() === b.getFullYear()
      && a.getMonth() === b.getMonth()
      && a.getDate() === b.getDate()
    );

    const startOfWeek = (date, weekStartsOn = 0) => {
      const start = atStartOfDay(date);
      const diff = (start.getDay() - weekStartsOn + 7) % 7;
      start.setDate(start.getDate() - diff);
      return start;
    };

    const parseKoreanMonthDay = (text, baseYear) => {
      const match = text.match(/(\d+)월\s*(\d+)일/);
      if (!match) return null;
      return new Date(baseYear, Number(match[1]) - 1, Number(match[2]));
    };

    const buildWeekDotCalendar = ({
      todayDate = new Date(),
      eventDate,
      weekStartsOn = 0
    }) => {
      const todayStart = atStartOfDay(todayDate);
      const eventStart = atStartOfDay(eventDate);
      const firstWeek = startOfWeek(todayStart, weekStartsOn);
      const eventWeek = startOfWeek(eventStart, weekStartsOn);
      const weekCount = Math.max(1, Math.round((eventWeek - firstWeek) / (7 * 24 * 60 * 60 * 1000)) + 1);
      const root = document.createElement("div");

      root.className = "week-calendar-inner";

      for (let week = 0; week < weekCount; week += 1) {
        const row = document.createElement("div");
        row.className = "week-row";

        for (let day = 0; day < 7; day += 1) {
          const date = addDays(firstWeek, week * 7 + day);
          const dot = document.createElement("span");
          const isToday = isSameDay(date, todayStart);
          const isEvent = isSameDay(date, eventStart);
          const dayOfWeek = date.getDay();

          dot.className = "week-dot";
          if (dayOfWeek === 0) dot.classList.add("is-sunday");
          if (dayOfWeek === 6) dot.classList.add("is-saturday");
          if (isToday) dot.classList.add("today");
          if (isEvent) dot.classList.add("event");
          dot.setAttribute("aria-label", `${date.getMonth() + 1}월 ${date.getDate()}일${isToday ? " 오늘" : ""}${isEvent ? " 예약 당일" : ""}`);
          row.append(dot);
        }

        root.append(row);
      }

      return root;
    };

    const renderWeekDotCalendar = (selector, options) => {
      document.querySelectorAll(selector).forEach((node) => {
        node.replaceChildren(buildWeekDotCalendar(options));
      });
    };

    const today = new Date();
    const eventDate = parseKoreanMonthDay(inviteData.reservedDate, today.getFullYear());
    if (eventDate && eventDate < atStartOfDay(today)) {
      eventDate.setFullYear(eventDate.getFullYear() + 1);
    }
    if (eventDate) {
      renderWeekDotCalendar("[data-week-calendar]", {
        todayDate: today,
        eventDate,
        weekStartsOn: 0
      });
    }

    const showToast = (message) => {
      const snackbar = document.querySelector("[data-snackbar]");
      if (!snackbar) return;

      snackbar.textContent = message;
      snackbar.classList.add("is-visible");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        snackbar.classList.remove("is-visible");
      }, 2100);
    };

    const setButtonDone = (button, message) => {
      const originalTitle = button.title;
      button.classList.add("is-done");
      button.title = message;
      setTimeout(() => {
        button.classList.remove("is-done");
        button.title = originalTitle;
      }, 1400);
    };

    const blobToDataUrl = (blob) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });

    const loadImage = (src) => new Promise((resolve, reject) => {
      const image = new Image();
      image.onload = () => resolve(image);
      image.onerror = reject;
      image.src = src;
    });

    const canvasToBlob = (canvas) => new Promise((resolve, reject) => {
      canvas.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject(new Error("이미지를 만들지 못했어요."));
      }, "image/png", 1);
    });

    const drawRoundRect = (context, x, y, width, height, radius) => {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + width, y, x + width, y + height, r);
      context.arcTo(x + width, y + height, x, y + height, r);
      context.arcTo(x, y + height, x, y, r);
      context.arcTo(x, y, x + width, y, r);
      context.closePath();
    };

    const fillRoundRect = (context, x, y, width, height, radius, fillStyle) => {
      drawRoundRect(context, x, y, width, height, radius);
      context.fillStyle = fillStyle;
      context.fill();
    };

    const strokeRoundRect = (context, x, y, width, height, radius, strokeStyle, lineWidth = 1) => {
      drawRoundRect(context, x, y, width, height, radius);
      context.strokeStyle = strokeStyle;
      context.lineWidth = lineWidth;
      context.stroke();
    };

    const drawWrappedText = (context, text, x, y, maxWidth, lineHeight, maxLines = Infinity) => {
      const paragraphs = String(text).split("\n");
      let currentY = y;
      let lines = 0;

      for (const paragraph of paragraphs) {
        if (!paragraph) {
          currentY += lineHeight * .72;
          continue;
        }

        const words = paragraph.split(" ");
        let line = "";

        for (const word of words) {
          const testLine = line ? `${line} ${word}` : word;
          if (context.measureText(testLine).width <= maxWidth) {
            line = testLine;
            continue;
          }

          context.fillText(line, x, currentY);
          currentY += lineHeight;
          lines += 1;
          line = word;
          if (lines >= maxLines) return currentY;
        }

        if (line) {
          context.fillText(line, x, currentY);
          currentY += lineHeight;
          lines += 1;
          if (lines >= maxLines) return currentY;
        }
      }

      return currentY;
    };

    const drawPill = (context, text, x, y, fillStyle, textStyle = "#252330") => {
      context.font = "900 24px -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif";
      const width = Math.ceil(context.measureText(text).width + 42);
      fillRoundRect(context, x, y, width, 46, 23, fillStyle);
      context.fillStyle = textStyle;
      context.fillText(text, x + 21, y + 31);
      return width;
    };

    const drawPosterContain = (context, image, x, y, width, height) => {
      const scale = Math.min(width / image.naturalWidth, height / image.naturalHeight);
      const drawWidth = image.naturalWidth * scale;
      const drawHeight = image.naturalHeight * scale;
      const drawX = x + (width - drawWidth) / 2;
      const drawY = y + (height - drawHeight) / 2;
      context.drawImage(image, drawX, drawY, drawWidth, drawHeight);
    };

    const inlineInviteImages = async (clone) => {
      const cloneImages = Array.from(clone.querySelectorAll("img"));
      const sourceImages = Array.from(document.querySelectorAll(".invite img"));

      await Promise.all(cloneImages.map(async (image, index) => {
        const source = sourceImages[index];
        const src = source?.currentSrc || source?.src || image.src;
        if (!src) return;

        const response = await fetch(src);
        const blob = await response.blob();
        image.src = await blobToDataUrl(blob);
      }));
    };

    const renderInviteElementBlob = async () => {
      const source = document.querySelector(".invite");
      if (!source) throw new Error("저장할 카드를 찾지 못했어요.");

      const rect = source.getBoundingClientRect();
      const width = Math.ceil(rect.width);
      const height = Math.ceil(rect.height);
      const scale = Math.min(2, window.devicePixelRatio || 1);
      const clone = source.cloneNode(true);

      clone.style.width = `${width}px`;
      clone.style.height = `${height}px`;
      clone.style.margin = "0";
      clone.style.boxShadow = "none";

      await inlineInviteImages(clone);

      const style = document.querySelector("style")?.textContent || "";
      const serialized = new XMLSerializer().serializeToString(clone);
      const svgText = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
          <foreignObject width="100%" height="100%">
            <div xmlns="http://www.w3.org/1999/xhtml">
              <style>${style}</style>
              ${serialized}
            </div>
          </foreignObject>
        </svg>`;
      const svgUrl = URL.createObjectURL(new Blob([svgText], { type: "image/svg+xml;charset=utf-8" }));
      const image = await loadImage(svgUrl);
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.width = width * scale;
      canvas.height = height * scale;
      context.scale(scale, scale);
      context.drawImage(image, 0, 0, width, height);
      URL.revokeObjectURL(svgUrl);
      return canvasToBlob(canvas);
    };

    const buildInviteImageBlob = async () => {
      const canvas = document.createElement("canvas");
      const scale = 2;
      const width = 1000;
      const height = 1260;
      const context = canvas.getContext("2d");

      canvas.width = width * scale;
      canvas.height = height * scale;
      context.scale(scale, scale);
      context.fillStyle = "#17191f";
      context.fillRect(0, 0, width, height);
      fillRoundRect(context, 34, 34, width - 68, height - 68, 44, "#fff8ed");
      fillRoundRect(context, 34, 34, width - 68, 10, 5, "#e66b58");

      context.fillStyle = "#252330";
      context.font = "950 48px -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif";
      drawWrappedText(context, inviteData.title, 78, 128, 720, 58, 2);
      context.fillStyle = "#6f6973";
      context.font = "900 24px -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif";
      context.fillText(inviteData.store, 80, 247);

      let pillX = 78;
      [
        [inviteData.genre, "#fff0ea"],
        [`${inviteData.playMinutes}분`, "#eaf5f1"],
        [inviteData.price, "#fff4df"],
        [inviteData.area, "#edf3fb"]
      ].forEach(([text, color]) => {
        pillX += drawPill(context, text, pillX, 282, color) + 12;
      });

      pillX = 78;
      [
        [`난이도 | ${inviteData.difficulty}`, "#eaf5f1", "#2d6055"],
        [`공포도 | ${inviteData.fear}`, "#edf3fb", "#39598f"],
        [`활동성 | ${inviteData.activity}`, "#fff4df", "#6b501d"]
      ].forEach(([text, color, textColor]) => {
        pillX += drawPill(context, text, pillX, 342, color, textColor) + 12;
      });

      const posterImage = await loadImage(inviteData.posterUrl);
      fillRoundRect(context, 78, 430, 520, 750, 30, "#efe2cf");
      fillRoundRect(context, 100, 452, 476, 706, 24, "#111111");
      drawPosterContain(context, posterImage, 100, 452, 476, 706);

      fillRoundRect(context, 622, 430, 300, 372, 28, "#ffffff");
      context.fillStyle = "#6a4d3a";
      context.font = "950 22px -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif";
      context.fillText("테마 소개", 650, 452);
      context.fillStyle = "#55505b";
      context.font = "800 22px -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif";
      drawWrappedText(context, inviteData.description, 650, 494, 220, 33, 8);

      fillRoundRect(context, 622, 830, 300, 350, 28, "#fbf7ef");
      context.fillStyle = "#6a4d3a";
      context.font = "950 22px -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif";
      context.fillText("예약 시간", 650, 852);
      context.fillStyle = "#756e78";
      context.font = "900 22px -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif";
      context.fillText(inviteData.reservedDate, 650, 890);
      context.fillStyle = "#252330";
      context.font = "950 24px -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif";
      context.fillText(document.querySelector("[data-time-range]")?.textContent || "", 650, 923);

      const event = parseKoreanMonthDay(inviteData.reservedDate, new Date().getFullYear());
      const first = startOfWeek(new Date(), 0);
      const eventStart = event ? atStartOfDay(event) : null;
      const todayStart = atStartOfDay(new Date());
      for (let i = 0; i < 14; i += 1) {
        const date = addDays(first, i);
        const col = i % 7;
        const row = Math.floor(i / 7);
        const dotX = 718 + col * 18;
        const dotY = 974 + row * 25;
        const day = date.getDay();
        const isToday = isSameDay(date, todayStart);
        const isEvent = eventStart && isSameDay(date, eventStart);
        context.beginPath();
        context.arc(dotX, dotY, 5, 0, Math.PI * 2);
        context.fillStyle = isToday || isEvent ? "#ffffff" : day === 0 ? "#e66b58" : day === 6 ? "#4d7ed8" : "rgba(48, 42, 51, .26)";
        context.fill();
        if (isToday || isEvent) {
          context.lineWidth = 3;
          context.strokeStyle = isEvent ? "#e66b58" : "#4d7ed8";
          context.stroke();
        }
      }

      strokeRoundRect(context, 34, 34, width - 68, height - 68, 44, "rgba(255, 248, 237, .5)", 2);
      return canvasToBlob(canvas);
    };

    const saveInviteAsImage = async () => {
      let blob;
      try {
        blob = await renderInviteElementBlob();
      } catch {
        blob = await buildInviteImageBlob();
      }
      const filename = "escape-room-invite.png";
      const file = typeof File === "function" ? new File([blob], filename, { type: "image/png" }) : null;

      if (file && navigator.canShare?.({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: inviteData.title,
          text: "방탈출 정보 카드"
        });
        return "이미지를 저장/공유했어요";
      }

      const url = URL.createObjectURL(blob);
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      if (isIOS) {
        window.open(url, "_blank", "noopener,noreferrer");
        setTimeout(() => URL.revokeObjectURL(url), 30000);
        return "이미지를 새 창으로 열었어요";
      }

      const link = document.createElement("a");
      link.download = filename;
      link.href = url;
      document.body.append(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 30000);
      return "이미지 저장을 시작했어요";
    };

    const invitationText = () => {
      const time = document.querySelector("[data-time-range]")?.textContent || "";
      const url = window.location.href;
      return [
        `🎆 테마: ${inviteData.title}`,
        `📍 매장: ${inviteData.store} (${inviteData.area})`,
        `🗓️ 예약: ${inviteData.reservedDate} ${time}`,
        `🎭 정보: ${inviteData.genre} · ${inviteData.playMinutes}분 · ${inviteData.price}`,
        `🧩 난이도: ${inviteData.difficulty} / 공포도: ${inviteData.fear} / 활동성: ${inviteData.activity}`,
        "",
        `🔗 카드 보기: ${url}`
      ].join("\n");
    };

    const copyInviteInfo = async () => {
      const text = invitationText();
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.opacity = "0";
      document.body.append(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    };

    document.querySelector("[data-save-card]")?.addEventListener("click", async (event) => {
      const button = event.currentTarget;
      try {
        const message = await saveInviteAsImage();
        setButtonDone(button, "저장 완료");
        showToast(message);
      } catch (error) {
        setButtonDone(button, "저장 실패");
        showToast(error.name === "AbortError" ? "저장을 취소했어요" : "이미지 저장에 실패했어요");
      }
    });

    document.querySelector("[data-copy-info]")?.addEventListener("click", async (event) => {
      const button = event.currentTarget;
      try {
        await copyInviteInfo();
        setButtonDone(button, "복사했어요");
        showToast("복사 완료");
      } catch {
        setButtonDone(button, "복사 실패");
        showToast("복사에 실패했어요");
      }
    });
  </script>
</body>

</html>
