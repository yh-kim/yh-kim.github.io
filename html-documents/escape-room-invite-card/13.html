<body>
  <script>
    window.escapeRoomInviteData = {
      "label": "방탈출 정보",
      "title": "피노키오",
      "store": "지구별 방탈출 홍대어드벤처점",
      "area": "홍대",
      "reservedDate": "일정 미정",
      "playMinutes": 70,
      "genre": "공포 / 판타지",
      "difficulty": "보통",
      "fear": "높음",
      "activity": "많음",
      "price": "각 29,000원",
      "description": "위태롭게 흔들리던 실이 끊어지자,\n무대 위 나무 인형의 눈이 빛나기 시작했다.\n\n삐걱.. 삐걱..\n\n마침내 피노키오는 인간이 되는 꿈을 꿨다.",
      "posterUrl": "./assets/poster-13.png",

  </script>

  <main class="page">
    <div class="invite-shell">
      <article class="invite" aria-label="방탈출 정보">
        <header class="header">
          <div class="header-title-row">
            <h1 class="header-title" data-field="title">피노키오</h1>
          </div>
          <p class="header-store" data-field="store">지구별 방탈출 홍대어드벤처점</p>
          <div class="header-meta" aria-label="테마 요약">
            <span class="meta-badge" data-field="genre">공포 / 판타지</span>
            <span class="meta-badge" data-play-minutes>70분</span>
            <span class="meta-badge" data-field="price">각 29,000원</span>
            <a class="meta-badge meta-location" data-link="mapUrl" href="https://map.naver.com/p/search/%EC%A7%80%EA%B5%AC%EB%B3%84%20%EB%B0%A9%ED%83%88%EC%B6%9C%20%ED%99%8D%EB%8C%80%EC%96%B4%EB%93%9C%EB%B2%A4%EC%B2%98%EC%A0%90%20%EC%84%9C%EC%9A%B8%ED%8A%B9%EB%B3%84%EC%8B%9C%20%EB%A7%88%ED%8F%AC%EA%B5%AC%20%EC%99%80%EC%9A%B0%EC%82%B0%EB%A1%9C21%EA%B8%B8%2031%203%EC%B8%B5" target="_blank" rel="noopener noreferrer" aria-label="네이버 지도 열기" title="네이버 지도 열기">
              <span data-field="area">홍대</span>
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"></path>
                <circle cx="12" cy="10" r="2.5"></circle>
              </svg>
            </a>
          </div>
          <div class="header-stats" data-stat-pills aria-label="난이도 공포도 활동성">
            <span class="stat-pill"><span>난이도</span><strong>보통</strong></span>
            <span class="stat-pill"><span>공포도</span><strong>높음</strong></span>
            <span class="stat-pill"><span>활동성</span><strong>많음</strong></span>
          </div>
        </header>

        <section class="poster-intro" aria-label="포스터와 테마 소개">
          <figure class="poster-panel">
            <div class="poster-frame">
              <img data-image="posterUrl" src="./assets/poster-13.png" alt="피노키오 포스터">
            </div>
          </figure>

          <section class="intro-panel">
            <div class="intro-copy">
              <span class="section-label">테마 소개</span>
              <p data-field="description">위태롭게 흔들리던 실이 끊어지자,
무대 위 나무 인형의 눈이 빛나기 시작했다.

삐걱.. 삐걱..

마침내 피노키오는 인간이 되는 꿈을 꿨다.</p>
            </div>
          </section>
        </section>
      </article>

      <div class="action-dock" aria-label="카드 작업">
        <a class="action-button" href="../escape-room-invite.html" data-list-link aria-label="방탈출 리스트로 이동" title="방탈출 리스트로 이동">

            <path d="M8 6h13"></path>
            <path d="M8 12h13"></path>
            <path d="M8 18h13"></path>
            <path d="M3 6h.01"></path>
            <path d="M3 12h.01"></path>
            <path d="M3 18h.01"></path>
          </svg>
        </a>
