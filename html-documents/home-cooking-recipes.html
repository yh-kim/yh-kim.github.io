<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>레시피 리스트</title>
  <meta name="description" content="집에서 해먹은 요리의 시간, 주요 재료, 레시피를 모아두는 개인 집밥 보관함">
  <link rel="shortcut icon" href="/img/favicon.ico">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Pimi's Blog">
  <meta property="og:title" content="레시피 리스트">
  <meta property="og:description" content="집에서 해먹은 요리의 시간, 주요 재료, 레시피를 모아두는 개인 집밥 보관함">
  <meta property="og:url" content="https://blog.pickth.com/html-documents/home-cooking-recipes.html">
  <meta property="og:image" content="https://blog.pickth.com/img/og-image.png">
  <meta property="og:image:secure_url" content="https://blog.pickth.com/img/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:image:alt" content="Pimi's Blog space icon">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="레시피 리스트">
  <meta name="twitter:description" content="집에서 해먹은 요리의 시간, 주요 재료, 레시피를 모아두는 개인 집밥 보관함">
  <meta name="twitter:image" content="https://blog.pickth.com/img/og-image.png">
  <style>
    :root {
      --bg: #fff6ef;
      --paper: #fffaf6;
      --ink: #24251f;
      --muted: #746b61;
      --line: #ead9c8;
      --accent: #e86645;
      --accent-soft: #ffe7dc;
      --herb: #5f8a4b;
      --herb-soft: #edf5df;
      --sky: #547f92;
      --sky-soft: #e8f1f3;
      --shadow: 0 16px 36px rgba(97, 69, 44, .12);
      --overlay: rgba(37, 34, 30, .42);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Segoe UI", sans-serif;
      line-height: 1.65;
      background:
        linear-gradient(180deg, #fffaf6 0%, var(--bg) 58%, #fffaf4 100%);
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
    }

    .hero {
      display: grid;
      gap: 0;
      padding: clamp(24px, 5vw, 46px) 0 18px;
    }

    h1 {
      margin: 0;
      max-width: 780px;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1.04;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      color: var(--ink);
    }

    main {
      padding: 0 0 52px;
    }

    .list-tools {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin: 0 0 16px;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .filter-control {
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid rgba(232, 102, 69, .38);
      border-radius: 999px;
      background: rgba(255, 250, 245, .86);
      color: #9a5a46;
      font: inherit;
      font-size: 13px;
      font-weight: 720;
      cursor: pointer;
    }

    .filter-control.logic {
      border-color: rgba(232, 102, 69, .38);
      background: rgba(255, 250, 245, .86);
      color: #9a5a46;
    }

    .active-filter-summary {
      display: none;
      max-width: min(100%, 520px);
      color: #8a4d3a;
      font-size: 12px;
      font-weight: 720;
      line-height: 1.45;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .active-filter-summary.is-visible {
      display: block;
    }

    .recipe-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .recipe-card {
      display: grid;
      min-height: 100%;
      border: 1px solid rgba(234, 217, 200, .95);
      border-radius: 14px;
      background: rgba(255, 250, 245, .96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .recipe-card.is-hidden {
      display: none;
    }

    .recipe-card a {
      display: grid;
      grid-template-columns: 142px minmax(0, 1fr);
      gap: 0;
      min-height: 168px;
      text-decoration: none;
      overflow: hidden;
    }

    .thumb {
      position: relative;
      min-height: 100%;
      width: 100%;
      background:
        linear-gradient(135deg, rgba(232, 102, 69, .14), rgba(95, 138, 75, .16)),
        #f3eadf;
      overflow: hidden;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body {
      display: grid;
      gap: 9px;
      align-content: start;
      min-width: 0;
      padding: 16px;
      overflow: hidden;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 5px 8px;
      border-radius: 999px;
      background: var(--sky-soft);
      color: var(--sky);
      font-size: 12px;
      font-weight: 760;
    }

    .pill.time {
      background: var(--herb-soft);
      color: var(--herb);
    }

    h2 {
      margin: 0;
      font-size: clamp(22px, 2.5vw, 28px);
      line-height: 1.18;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      word-break: keep-all;
    }

    .summary {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 560;
    }

    .ingredients {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .ingredients li {
      padding: 5px 8px;
      border: 1px solid #ead9c8;
      border-radius: 999px;
      background: #fff;
      color: #6d5542;
      font-size: 12px;
      font-weight: 850;
    }

    .filter-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: end;
      background: var(--overlay);
      padding: 16px;
    }

    .filter-layer.is-open {
      display: flex;
    }

    .filter-panel {
      width: min(520px, 100%);
      margin: 0 auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px 16px var(--radius) var(--radius);
      background: var(--paper);
      box-shadow: 0 22px 60px rgba(37, 34, 30, .2);
    }

    .filter-title {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.2;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 16px;
      padding: 0;
      list-style: none;
    }

    .tag-chip {
      min-height: 36px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: #6d5542;
      font: inherit;
      font-size: 13px;
      font-weight: 760;
      cursor: pointer;
    }

    .tag-chip[aria-pressed="true"] {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .filter-action {
      min-height: 42px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: #6d5542;
      font: inherit;
      font-size: 14px;
      font-weight: 760;
      cursor: pointer;
    }

    .filter-action.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .empty-state {
      display: none;
      margin: 14px 0 0;
      padding: 18px;
      border: 1px dashed #cbbd9f;
      border-radius: var(--radius);
      background: rgba(255, 253, 248, .82);
      color: var(--muted);
      font-weight: 800;
    }

    .empty-state.is-visible {
      display: block;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 20px, 1040px);
      }

      .recipe-list {
        grid-template-columns: 1fr;
      }

      .recipe-card a {
        grid-template-columns: 116px minmax(0, 1fr);
        min-height: 132px;
      }

      .thumb {
        height: 100%;
      }

      .card-body {
        gap: 6px;
        padding: 11px 12px;
      }

      .pill,
      .ingredients li {
        min-height: 24px;
        padding: 4px 7px;
        font-size: 11px;
      }

      .summary {
        display: -webkit-box;
        overflow: hidden;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .active-filter-summary {
        flex-basis: 100%;
        text-align: left;
      }
    }

    @media (max-width: 520px) {
      .hero {
        padding-top: 18px;
      }

      h1 {
        font-size: 30px;
      }

      .filter-layer {
        padding: 10px;
      }

      .filter-panel {
        padding: 16px;
      }
    }
  </style>
</head>

<body>
  <header class="page hero">
    <h1>레시피 리스트</h1>
  </header>

  <main class="page">
    <div class="list-tools">
      <div class="filter-bar">
        <button class="filter-control" type="button" data-filter-kind="tag">태그</button>
        <button class="filter-control" type="button" data-filter-kind="ingredient">재료</button>
        <button class="filter-control logic" type="button" id="logicToggle" aria-label="조회 조건">AND</button>
        <button class="filter-control" type="button" id="resetFilter">초기화</button>
      </div>
      <p class="active-filter-summary" id="activeFilterSummary"></p>
    </div>
    <ul class="recipe-list" aria-label="음식 목록">
      <li class="recipe-card" data-tags="냉국 여름 반찬" data-ingredients="오이 양파 청양고추 냉면육수">
        <a href="/html-documents/home-cooking-recipes/1.html">
          <span class="thumb">
            <img src="/html-documents/home-cooking-recipes/assets/oi-naengguk.png" alt="오이냉국">
          </span>
          <span class="card-body">
            <span class="meta">
              <span class="pill time">약 10분</span>
              <span class="pill">냉국</span>
              <span class="pill">여름</span>
            </span>
            <h2>오이냉국</h2>
            <p class="summary">시판 냉면육수와 오이, 양파, 청양고추로 빠르게 만드는 시원한 집밥 반찬.</p>
            <ul class="ingredients" aria-label="주요 재료">
              <li>오이</li>
              <li>양파</li>
              <li>청양고추</li>
              <li>냉면육수</li>
            </ul>
          </span>
        </a>
      </li>
    </ul>
    <p class="empty-state" id="emptyState">선택한 필터와 맞는 음식이 없습니다.</p>
  </main>

  <div class="filter-layer" id="filterLayer" role="dialog" aria-modal="true" aria-labelledby="filterTitle">
    <section class="filter-panel">
      <h2 class="filter-title" id="filterTitle">태그 선택</h2>
      <ul class="chip-list" id="chipList" aria-label="필터 목록"></ul>
      <button class="filter-action primary" type="button" id="applyFilter">확인</button>
    </section>
  </div>

  <script>
    const cards = Array.from(document.querySelectorAll(".recipe-card"));
    const filterControls = Array.from(document.querySelectorAll("[data-filter-kind]"));
    const filterLayer = document.querySelector("#filterLayer");
    const chipList = document.querySelector("#chipList");
    const resetFilter = document.querySelector("#resetFilter");
    const applyFilter = document.querySelector("#applyFilter");
    const logicToggle = document.querySelector("#logicToggle");
    const activeFilterSummary = document.querySelector("#activeFilterSummary");
    const emptyState = document.querySelector("#emptyState");
    const selectedTags = new Set();
    const selectedIngredients = new Set();
    let activeFilterKind = "tag";
    let filterLogic = "AND";

    const filterData = {
      tag: {
        title: "태그 선택",
        items: Array.from(new Set(cards.flatMap((card) => card.dataset.tags.split(/\s+/).filter(Boolean)))).sort((a, b) => a.localeCompare(b, "ko")),
        selected: selectedTags
      },
      ingredient: {
        title: "재료 선택",
        items: Array.from(new Set(cards.flatMap((card) => card.dataset.ingredients.split(/\s+/).filter(Boolean)))).sort((a, b) => a.localeCompare(b, "ko")),
        selected: selectedIngredients
      }
    };

    function renderChips(kind) {
      const data = filterData[kind];
      document.querySelector("#filterTitle").textContent = data.title;
      chipList.innerHTML = data.items.map((item) => `
        <li><button class="tag-chip" type="button" aria-pressed="${data.selected.has(item)}" data-value="${item}">${item}</button></li>
      `).join("");
    }

    function updateChipState() {
      document.querySelectorAll(".tag-chip").forEach((chip) => {
        chip.setAttribute("aria-pressed", String(filterData[activeFilterKind].selected.has(chip.dataset.value)));
      });
    }

    function applyFilters() {
      const selectedFilters = [
        ...Array.from(selectedTags).map((value) => ({ kind: "tag", value })),
        ...Array.from(selectedIngredients).map((value) => ({ kind: "ingredient", value }))
      ];
      let visibleCount = 0;

      cards.forEach((card) => {
        const cardTags = card.dataset.tags.split(/\s+/);
        const cardIngredients = card.dataset.ingredients.split(/\s+/);
        const matches = selectedFilters.map((filter) => (
          filter.kind === "tag"
            ? cardTags.includes(filter.value)
            : cardIngredients.includes(filter.value)
        ));
        const visible = selectedFilters.length === 0
          ? true
          : filterLogic === "AND"
          ? matches.every(Boolean)
          : matches.some(Boolean);
        card.classList.toggle("is-hidden", !visible);
        if (visible) visibleCount += 1;
      });

      const selected = [
        ...Array.from(selectedTags).map((tag) => `태그 ${tag}`),
        ...Array.from(selectedIngredients).map((ingredient) => `재료 ${ingredient}`)
      ];
      activeFilterSummary.textContent = selected.length ? `${filterLogic} · ${selected.join(" · ")}` : "";
      activeFilterSummary.classList.toggle("is-visible", selected.length > 0);
      emptyState.classList.toggle("is-visible", visibleCount === 0);
    }

    function closeLayer() {
      filterLayer.classList.remove("is-open");
    }

    chipList.addEventListener("click", (event) => {
      const chip = event.target.closest(".tag-chip");
      if (!chip) return;
      const selected = filterData[activeFilterKind].selected;

      if (selected.has(chip.dataset.value)) {
        selected.delete(chip.dataset.value);
      } else {
        selected.add(chip.dataset.value);
      }
      updateChipState();
    });

    filterControls.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilterKind = button.dataset.filterKind;
        renderChips(activeFilterKind);
        filterLayer.classList.add("is-open");
      });
    });

    logicToggle.addEventListener("click", () => {
      filterLogic = filterLogic === "AND" ? "OR" : "AND";
      logicToggle.textContent = filterLogic;
      applyFilters();
    });

    resetFilter.addEventListener("click", () => {
      selectedTags.clear();
      selectedIngredients.clear();
      renderChips(activeFilterKind);
      applyFilters();
      closeLayer();
    });

    applyFilter.addEventListener("click", () => {
      applyFilters();
      closeLayer();
    });

    filterLayer.addEventListener("click", (event) => {
      if (event.target === filterLayer) closeLayer();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && filterLayer.classList.contains("is-open")) {
        closeLayer();
      }
    });
  </script>
</body>

</html>
