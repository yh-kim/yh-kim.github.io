    window.dataLayer = window.dataLayer || [];

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="google-site-verification" content="hd9SWsVksA9nJ4ugHsevLDHPEBSePTUkzhCobJpPPwY" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="{{ site.description }}">
    <meta name="keywords"  content="{{ site.keyword }}">
    <meta name="theme-color" content="#050917">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <title>{% if page.title %}{{ page.title }} - {{ site.SEOTitle }}{% else %}{{ site.SEOTitle }}{% endif %}</title>

    <!-- Web App Manifest -->
    <link rel="manifest" href="{{ site.baseurl }}/pwa/manifest.json">

    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ site.baseurl }}/img/favicon.ico">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

    <!-- Bootstrap Core CSS -->
    <link rel="stylesheet" href="{{ "/css/bootstrap.min.css" | prepend: site.baseurl }}">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ "/css/hux-blog.min.css" | prepend: site.baseurl }}">

    <!-- Pygments Github CSS -->
    <link rel="stylesheet" href="{{ "/css/syntax.css" | prepend: site.baseurl }}">

    <!-- Custom Fonts -->
    <!-- <link href="http://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css" rel="stylesheet" type="text/css"> -->
    <!-- Hux change font-awesome CDN to qiniu -->
    <link href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/4.6.3/css/font-awesome.min.css" rel="stylesheet" type="text/css">
    
    <link rel="stylesheet" href="{{ "/css/pickth.css" | prepend: site.baseurl }}">

    <style>
        html {
            background-color: #050917;
            background-image: linear-gradient(180deg, #050917 0, #050917 140px, #ffffff 140px, #ffffff 100%);
            background-repeat: no-repeat;
            background-size: 100% 100%;
            min-height: 100%;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body {
            background-color: transparent;
            min-height: 100%;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body.layout-home {
            background-color: #050917;
        }

        .site-main {
            background: #ffffff;
            min-height: 100vh;
        }

        body.layout-home .site-main {
            background: transparent;
            min-height: 100vh;
        }

        .navbar {
            width: 100%;
            max-width: 100vw;
            overflow: visible;
            z-index: 20;
        }

        .navbar-custom.is-fixed {
            background-color: rgba(5, 9, 23, .94);
            border-bottom-color: rgba(255, 255, 255, .08);
        }

        .navbar-custom.is-fixed .navbar-brand,
        .navbar-custom.is-fixed .nav li a {
            color: #ffffff;
        }

        .navbar-custom.is-fixed .navbar-brand:hover,
        .navbar-custom.is-fixed .navbar-brand:focus,
        .navbar-custom.is-fixed .nav li a:hover,
        .navbar-custom.is-fixed .nav li a:focus {
            color: rgba(255, 255, 255, .78);
        }

        .navbar-custom.is-fixed .navbar-toggle .icon-bar {
            background-color: #ffffff;
        }

        @media only screen and (max-width: 768px) {
            #huxblog_navbar .navbar-collapse {
                background: rgba(5, 9, 23, .94);
                border: 1px solid rgba(255, 255, 255, .08);
                box-shadow: 0 10px 26px rgba(0, 0, 0, .24);
            }

            #huxblog_navbar .navbar-collapse a,
            .navbar-custom.is-fixed #huxblog_navbar .navbar-collapse a {
                color: #ffffff;
            }

            #huxblog_navbar .navbar-collapse a:hover,
            #huxblog_navbar .navbar-collapse a:focus {
                color: rgba(255, 255, 255, .78);
            }
        }

        .navbar .container-fluid,
        #huxblog_navbar {
            max-width: 100%;
            overflow: visible;
        }

        .intro-header {
            position: relative;
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            background: #050917 url("{{ "/img/cosmic-space-bg.png" | prepend: site.baseurl }}") center center / cover no-repeat !important;
        }

        .intro-header:before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at center, transparent 42%, rgba(2, 4, 14, .24) 100%),
                linear-gradient(180deg, rgba(1, 3, 12, .18), transparent 34%, rgba(1, 3, 12, .12));
            pointer-events: none;
        }

        .intro-header:after {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 20% 42%, rgba(144, 83, 255, .08), transparent 28rem);
            pointer-events: none;
        }

        .intro-header .container {
            position: relative;
            z-index: 1;
        }

        @media only screen and (max-width: 768px) {
            .intro-header {
                background-position: 68% center !important;
            }
        }

        .postlist-container,
        .post-preview,
        .post-preview a,
        .post-preview h2,
        .post-preview h3,
        .post-content-preview {
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: keep-all;
        }

        .ios-safe-area-bg {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            height: constant(safe-area-inset-top);
            height: env(safe-area-inset-top);
            background: #050917;
            z-index: 2;
            pointer-events: none;
        }
    </style>
