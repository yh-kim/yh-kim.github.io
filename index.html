---
layout: home
---

<style>
  .home-ripple {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    isolation: isolate;
    padding: 96px 24px 40px;
    background: #15181d;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
  }

  .home-ripple:before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(44, 111, 255, .12), transparent 26rem),
      radial-gradient(circle at 80% 30%, rgba(31, 196, 142, .13), transparent 24rem),
      radial-gradient(circle at 50% 100%, rgba(158, 178, 255, .12), transparent 30rem),
      radial-gradient(circle at 52% 48%, rgba(255, 255, 255, .06), transparent 16rem),
      linear-gradient(180deg, #161b27 0%, #070a10 100%);
    z-index: 0;
  }

  .home-ripple:after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(255, 255, 255, .42) 0 1px, transparent 1.4px),
      radial-gradient(circle, rgba(136, 180, 255, .22) 0 1px, transparent 1.7px);
    background-position: 0 0, 38px 54px;
    background-size: 110px 110px, 170px 170px;
    opacity: .34;
    z-index: 0;
  }

  .home-ripple-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    touch-action: none;
  }

  .home-ripple-text {
    position: relative;
    z-index: 2;
    margin: 0;
    font-size: 22px;
    color: rgba(255, 255, 255, .88);
    text-shadow: 0 0 24px rgba(180, 205, 255, .25);
  }
</style>

<style>
  html,
  body {
    min-height: 100%;
    overflow: hidden;
    background: #161b27;
    overscroll-behavior: none;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
  }
</style>

<section class="home-ripple" aria-label="welcome">
  <canvas class="home-ripple-canvas" data-ripple-canvas aria-hidden="true"></canvas>
  <p class="home-ripple-text">hello.</p>
</section>

<script>
(function () {
  var canvas = document.querySelector('[data-ripple-canvas]');
  if (!canvas || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var target = null;
  var tail = [];
  var raf = null;
  var bounds = null;
  var lastMove = 0;
  var lastVisibleMove = 0;
  var velocity = 0;
  var drawEnergy = 0;
  var tailLength = 18;
  var slowSpeedLimit = 0.42;

  function resize() {
    bounds = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, Math.floor(bounds.width * dpr));
    canvas.height = Math.max(1, Math.floor(bounds.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function seedTail(x, y) {
    var now = performance.now();
    target = { x: x, y: y };
    lastMove = now;
    lastVisibleMove = now;
    velocity = 0;
    drawEnergy = 0;
    tail = [];

    for (var i = 0; i < tailLength; i += 1) {
      tail.push({ x: x, y: y });
    }
    if (!raf) raf = requestAnimationFrame(draw);
  }

  function moveTarget(x, y) {
    var now = performance.now();
    if (!target || !tail.length) {
      seedTail(x, y);
      return;
    }

    var dx = x - target.x;
    var dy = y - target.y;
    var distance = Math.sqrt(dx * dx + dy * dy);
    var elapsed = Math.max(16, now - lastMove);
    var rawSpeed = distance / elapsed;

    target.x = x;
    target.y = y;
    lastMove = now;

    if (distance >= 10 && rawSpeed >= slowSpeedLimit) {
      velocity = Math.min(1, rawSpeed / 1.35);
      drawEnergy = Math.min(1, drawEnergy + velocity * 0.72);
      lastVisibleMove = now;
    } else {
      velocity *= 0.68;
      drawEnergy *= 0.96;
    }

    if (!raf) raf = requestAnimationFrame(draw);
  }

  function lerp(from, to, amount) {
    return from + (to - from) * amount;
  }

  function draw() {
    raf = null;
    ctx.clearRect(0, 0, bounds.width, bounds.height);
    ctx.globalCompositeOperation = 'source-over';

    var now = performance.now();
    var inactive = Math.min(1, Math.max(0, (now - lastVisibleMove - 90) / 420));
    var activeAlpha = Math.max(0, 1 - inactive);
    var visibleMotion = drawEnergy;

    if (target && tail.length) {
      tail[0].x = lerp(tail[0].x, target.x, 0.46);
      tail[0].y = lerp(tail[0].y, target.y, 0.46);

      for (var i = 1; i < tail.length; i += 1) {
        tail[i].x = lerp(tail[i].x, tail[i - 1].x, 0.34);
        tail[i].y = lerp(tail[i].y, tail[i - 1].y, 0.34);
      }
    }

    drawEnergy *= 0.975;

    if (tail.length > 2 && activeAlpha > 0.01 && visibleMotion > 0.004) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.filter = 'blur(4px)';

      for (var pass = 0; pass < 2; pass += 1) {
        ctx.beginPath();
        var first = tail[0];
        ctx.moveTo(first.x, first.y);

        for (var j = 1; j < tail.length - 1; j += 1) {
          var curr = tail[j];
          var next = tail[j + 1];
          var mid = {
            x: (curr.x + next.x) / 2,
            y: (curr.y + next.y) / 2
          };
          ctx.quadraticCurveTo(curr.x, curr.y, mid.x, mid.y);
        }

        var motionAlpha = Math.pow(visibleMotion, 1.4);
        var width = [22, 7][pass];
        var alpha = [0.2, 0.28][pass] * activeAlpha * motionAlpha;
        var gradient = ctx.createLinearGradient(0, 0, bounds.width, bounds.height);
        gradient.addColorStop(0, 'rgba(98, 132, 255,' + alpha + ')');
        gradient.addColorStop(0.48, 'rgba(80, 225, 190,' + (alpha * 0.72) + ')');
        gradient.addColorStop(1, 'rgba(218, 228, 255,' + (alpha * 0.42) + ')');

        ctx.strokeStyle = gradient;
        ctx.lineWidth = width;
        ctx.stroke();
      }
      ctx.restore();
    }

    if (activeAlpha > 0.01 || visibleMotion > 0.004 || (target && tail.length && Math.abs(tail[0].x - target.x) > 0.5)) {
      raf = requestAnimationFrame(draw);
    }
  }

  function handleMove(event) {
    if (!bounds) resize();
    var point = event.touches ? event.touches[0] : event;
    moveTarget(point.clientX - bounds.left, point.clientY - bounds.top);
  }

  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('pointermove', handleMove);
  canvas.addEventListener('pointerdown', handleMove);
  canvas.addEventListener('touchmove', handleMove, { passive: true });
  canvas.addEventListener('touchstart', handleMove, { passive: true });
}());
</script>
