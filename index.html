---
layout: home
---

<style>
  .home-ripple {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    isolation: isolate;
    padding: 96px 24px 40px;
    background: #050917 url("{{ "/img/cosmic-space-bg.png" | prepend: site.baseurl }}") center center / cover no-repeat;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .home-ripple,
  .home-ripple * {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .home-ripple::selection,
  .home-ripple *::selection {
    background: transparent;
  }

  .home-ripple:before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 42%, rgba(2, 4, 14, .24) 100%),
      linear-gradient(180deg, rgba(1, 3, 12, .18), transparent 34%, rgba(1, 3, 12, .12));
    z-index: 0;
  }

  .home-ripple:after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 20% 42%, rgba(144, 83, 255, .08), transparent 28rem);
    z-index: 0;
  }

  .home-ripple-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    touch-action: none;
  }

  .home-ripple-text {
    position: relative;
    z-index: 2;
    margin: 0;
    font-size: 22px;
    color: rgba(255, 255, 255, .88);
    text-shadow: 0 0 24px rgba(180, 205, 255, .25);
  }

  @media only screen and (max-width: 768px) {
    .home-ripple {
      background-position: 68% center;
    }
  }
</style>

<style>
  html,
  body {
    min-height: 100%;
    overflow: hidden;
    background: #050917;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
  }
</style>

<section class="home-ripple" aria-label="welcome">
  <canvas class="home-ripple-canvas" data-ripple-canvas aria-hidden="true"></canvas>
  <p class="home-ripple-text">hello.</p>
</section>

<script>
(function () {
  var canvas = document.querySelector('[data-ripple-canvas]');
  if (!canvas || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var target = null;
  var tail = [];
  var raf = null;
  var bounds = null;
  var lastMove = 0;
  var lastVisibleMove = 0;
  var velocity = 0;
  var drawEnergy = 0;
  var tailLength = 34;
  var slowSpeedLimit = 0.015;

  function resize() {
    bounds = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, Math.floor(bounds.width * dpr));
    canvas.height = Math.max(1, Math.floor(bounds.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function seedTail(x, y) {
    var now = performance.now();
    target = { x: x, y: y };
    lastMove = now;
    lastVisibleMove = now;
    velocity = 0;
    drawEnergy = 0;
    tail = [];

    for (var i = 0; i < tailLength; i += 1) {
      tail.push({ x: x, y: y });
    }
    if (!raf) raf = requestAnimationFrame(draw);
  }

  function moveTarget(x, y) {
    var now = performance.now();
    if (!target || !tail.length) {
      seedTail(x, y);
      return;
    }

    var dx = x - target.x;
    var dy = y - target.y;
    var distance = Math.sqrt(dx * dx + dy * dy);
    var elapsed = Math.max(16, now - lastMove);
    var rawSpeed = distance / elapsed;

    target.x = x;
    target.y = y;
    lastMove = now;

    if (distance >= 0.8) {
      var speedEnergy = Math.min(1, rawSpeed / 0.9);
      var distanceEnergy = Math.min(1, distance / 18);
      var movementEnergy = Math.max(0.04, (speedEnergy * 0.72) + (distanceEnergy * 0.28));
      if (rawSpeed < slowSpeedLimit) movementEnergy *= 0.55;

      velocity = lerp(velocity, movementEnergy, 0.32);
      drawEnergy = Math.min(1, Math.max(drawEnergy * 0.986, 0.08 + velocity * 0.76));
      lastVisibleMove = now;
    } else {
      velocity = lerp(velocity, 0, 0.12);
      drawEnergy *= 0.982;
    }

    if (!raf) raf = requestAnimationFrame(draw);
  }

  function lerp(from, to, amount) {
    return from + (to - from) * amount;
  }

  function draw() {
    raf = null;
    ctx.clearRect(0, 0, bounds.width, bounds.height);
    ctx.globalCompositeOperation = 'source-over';

    var now = performance.now();
    var inactive = Math.min(1, Math.max(0, (now - lastVisibleMove - 220) / 1300));
    var activeAlpha = Math.max(0, 1 - inactive);
    var visibleMotion = drawEnergy;

    if (target && tail.length) {
      tail[0].x = lerp(tail[0].x, target.x, 0.54);
      tail[0].y = lerp(tail[0].y, target.y, 0.54);

      for (var i = 1; i < tail.length; i += 1) {
        tail[i].x = lerp(tail[i].x, tail[i - 1].x, 0.20);
        tail[i].y = lerp(tail[i].y, tail[i - 1].y, 0.20);
      }
    }

    drawEnergy *= 0.982;

    if (tail.length > 2 && activeAlpha > 0.006 && visibleMotion > 0.002) {
      var meteorAlpha = activeAlpha * Math.pow(visibleMotion, 1.05);
      var head = tail[0];
      var maxTailSegments = Math.min(tail.length - 2, 24);

      function drawMeteorTail(width, blur, alphaScale) {
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.filter = blur ? 'blur(' + blur + 'px)' : 'none';

        for (var j = 0; j < maxTailSegments; j += 1) {
          var curr = tail[j];
          var next = tail[j + 1];
          var after = tail[j + 2] || next;
          var mid = {
            x: (next.x + after.x) / 2,
            y: (next.y + after.y) / 2
          };
          var progress = j / maxTailSegments;
          var tailSegmentFade = Math.pow(1 - progress, 2.35);
          var alpha = meteorAlpha * alphaScale * tailSegmentFade;

          if (alpha < 0.004) continue;

          var segmentGradient = ctx.createLinearGradient(curr.x, curr.y, mid.x, mid.y);
          segmentGradient.addColorStop(0, 'rgba(255, 255, 255,' + (0.58 * alpha) + ')');
          segmentGradient.addColorStop(0.22, 'rgba(210, 221, 255,' + (0.48 * alpha) + ')');
          segmentGradient.addColorStop(0.58, 'rgba(139, 132, 255,' + (0.28 * alpha) + ')');
          segmentGradient.addColorStop(1, 'rgba(83, 64, 184, 0)');

          ctx.beginPath();
          ctx.moveTo(curr.x, curr.y);
          ctx.quadraticCurveTo(next.x, next.y, mid.x, mid.y);
          ctx.strokeStyle = segmentGradient;
          ctx.lineWidth = width * (0.22 + (0.78 * tailSegmentFade));
          ctx.stroke();
        }
        ctx.restore();
      }

      drawMeteorTail(16, 10, 0.46);
      drawMeteorTail(5, 2, 0.88);

      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      var headGlow = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 18 + (20 * meteorAlpha));
      headGlow.addColorStop(0, 'rgba(255, 255, 255,' + (0.95 * meteorAlpha) + ')');
      headGlow.addColorStop(0.14, 'rgba(219, 229, 255,' + (0.78 * meteorAlpha) + ')');
      headGlow.addColorStop(0.42, 'rgba(132, 149, 255,' + (0.34 * meteorAlpha) + ')');
      headGlow.addColorStop(1, 'rgba(112, 79, 255, 0)');
      ctx.fillStyle = headGlow;
      ctx.beginPath();
      ctx.arc(head.x, head.y, 18 + (20 * meteorAlpha), 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = 'rgba(255, 255, 255,' + (0.9 * meteorAlpha) + ')';
      ctx.beginPath();
      ctx.arc(head.x, head.y, 1.5 + (1.8 * meteorAlpha), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    if (activeAlpha > 0.006 || visibleMotion > 0.002 || (target && tail.length && Math.abs(tail[0].x - target.x) > 0.5)) {
      raf = requestAnimationFrame(draw);
    }
  }

  function handleMove(event) {
    if (!bounds) resize();
    var point = event.touches ? event.touches[0] : event;
    moveTarget(point.clientX - bounds.left, point.clientY - bounds.top);
  }

  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('pointermove', handleMove);
  canvas.addEventListener('pointerdown', handleMove);
  canvas.addEventListener('touchmove', handleMove, { passive: true });
  canvas.addEventListener('touchstart', handleMove, { passive: true });
}());
</script>
