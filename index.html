---
layout: home
---

<style>
  .home-ripple {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    isolation: isolate;
    padding: 96px 24px 40px;
    background: #d9dde1;
  }

  .home-ripple:before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(44, 111, 255, .12), transparent 26rem),
      radial-gradient(circle at 80% 40%, rgba(0, 180, 130, .09), transparent 24rem),
      linear-gradient(180deg, #e4e7ea 0%, #cfd5db 100%);
    z-index: 0;
  }

  .home-ripple-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .home-ripple-text {
    position: relative;
    z-index: 2;
    margin: 0;
    font-size: 22px;
    color: #404040;
  }
</style>

<style>
  html,
  body {
    overflow: hidden;
  }
</style>

<section class="home-ripple" aria-label="welcome">
  <canvas class="home-ripple-canvas" data-ripple-canvas aria-hidden="true"></canvas>
  <p class="home-ripple-text">hello.</p>
</section>

<script>
(function () {
  var canvas = document.querySelector('[data-ripple-canvas]');
  if (!canvas || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var points = [];
  var raf = null;
  var bounds = null;
  var lastPoint = null;

  function resize() {
    bounds = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, Math.floor(bounds.width * dpr));
    canvas.height = Math.max(1, Math.floor(bounds.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function addPoint(x, y) {
    var now = performance.now();
    if (lastPoint) {
      var dx = x - lastPoint.x;
      var dy = y - lastPoint.y;
      if (Math.sqrt(dx * dx + dy * dy) < 5) return;
    }
    lastPoint = { x: x, y: y };
    points.push({ x: x, y: y, born: now, vx: 0, vy: 0 });
    if (points.length > 72) points.shift();
    if (!raf) raf = requestAnimationFrame(draw);
  }

  function smoothPoint(a, b, c, t) {
    var t2 = t * t;
    return {
      x: a.x * (1 - 2 * t + t2) + b.x * (2 * t - 2 * t2) + c.x * t2,
      y: a.y * (1 - 2 * t + t2) + b.y * (2 * t - 2 * t2) + c.y * t2
    };
  }

  function draw() {
    raf = null;
    ctx.clearRect(0, 0, bounds.width, bounds.height);
    ctx.globalCompositeOperation = 'source-over';

    var now = performance.now();
    for (var i = points.length - 1; i >= 0; i -= 1) {
      if (now - points[i].born > 1300) {
        points.splice(i, 1);
      }
    }

    if (points.length > 2) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.filter = 'blur(14px)';

      for (var pass = 0; pass < 3; pass += 1) {
        ctx.beginPath();
        var first = points[0];
        ctx.moveTo(first.x, first.y);

        for (var j = 1; j < points.length - 1; j += 1) {
          var prev = points[j - 1];
          var curr = points[j];
          var next = points[j + 1];
          var mid = smoothPoint(prev, curr, next, 0.5);
          ctx.quadraticCurveTo(curr.x, curr.y, mid.x, mid.y);
        }

        var age = Math.min(1, (now - points[0].born) / 1300);
        var fade = Math.pow(1 - age, 0.75);
        var width = [34, 18, 7][pass];
        var alpha = [0.18, 0.22, 0.28][pass] * fade;
        var gradient = ctx.createLinearGradient(0, 0, bounds.width, bounds.height);
        gradient.addColorStop(0, 'rgba(40, 105, 255,' + alpha + ')');
        gradient.addColorStop(0.45, 'rgba(70, 210, 170,' + (alpha * 0.7) + ')');
        gradient.addColorStop(1, 'rgba(255, 255, 255,' + (alpha * 0.35) + ')');

        ctx.strokeStyle = gradient;
        ctx.lineWidth = width;
        ctx.stroke();
      }
      ctx.restore();
    }

    if (points.length) raf = requestAnimationFrame(draw);
  }

  function handleMove(event) {
    if (!bounds) resize();
    var point = event.touches ? event.touches[0] : event;
    addPoint(point.clientX - bounds.left, point.clientY - bounds.top);
  }

  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('pointermove', handleMove);
  canvas.addEventListener('pointerdown', handleMove);
  canvas.addEventListener('touchmove', handleMove, { passive: true });
}());
</script>
