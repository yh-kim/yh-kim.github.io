---
layout: home
---

<style>
  .home-ripple {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    isolation: isolate;
    padding: 96px 24px 40px;
    background: #ffffff;
  }

  .home-ripple:before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(44, 111, 255, .10), transparent 26rem),
      radial-gradient(circle at 80% 40%, rgba(0, 180, 130, .08), transparent 24rem);
    z-index: 0;
  }

  .home-ripple-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .home-ripple-text {
    position: relative;
    z-index: 2;
    margin: 0;
    font-size: 22px;
    color: #404040;
  }
</style>

<section class="home-ripple" aria-label="welcome">
  <canvas class="home-ripple-canvas" data-ripple-canvas aria-hidden="true"></canvas>
  <p class="home-ripple-text">hello.</p>
</section>

<script>
(function () {
  var canvas = document.querySelector('[data-ripple-canvas]');
  if (!canvas || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var points = [];
  var raf = null;
  var bounds = null;

  function resize() {
    bounds = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, Math.floor(bounds.width * dpr));
    canvas.height = Math.max(1, Math.floor(bounds.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function addPoint(x, y) {
    points.push({ x: x, y: y, age: 0, life: 90 });
    if (points.length > 42) points.shift();
    if (!raf) raf = requestAnimationFrame(draw);
  }

  function draw() {
    raf = null;
    ctx.clearRect(0, 0, bounds.width, bounds.height);

    for (var i = points.length - 1; i >= 0; i -= 1) {
      var p = points[i];
      p.age += 1;
      var t = p.age / p.life;
      if (t >= 1) {
        points.splice(i, 1);
        continue;
      }

      var radius = 16 + t * 92;
      var alpha = Math.pow(1 - t, 1.7) * 0.35;
      var gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, radius);
      gradient.addColorStop(0, 'rgba(42, 118, 255,' + alpha + ')');
      gradient.addColorStop(0.42, 'rgba(52, 196, 150,' + (alpha * 0.42) + ')');
      gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

      ctx.beginPath();
      ctx.fillStyle = gradient;
      ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(42, 118, 255,' + (alpha * 0.28) + ')';
      ctx.lineWidth = 1;
      ctx.arc(p.x, p.y, radius * 0.58, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (points.length) raf = requestAnimationFrame(draw);
  }

  function handleMove(event) {
    if (!bounds) resize();
    var point = event.touches ? event.touches[0] : event;
    addPoint(point.clientX - bounds.left, point.clientY - bounds.top);
  }

  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('pointermove', handleMove);
  canvas.addEventListener('pointerdown', handleMove);
  canvas.addEventListener('touchmove', handleMove, { passive: true });
}());
</script>
