---
layout: home
---

<style>
  .home-ripple {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    isolation: isolate;
    padding: 96px 24px 40px;
    background: #15181d;
  }

  .home-ripple:before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(44, 111, 255, .12), transparent 26rem),
      radial-gradient(circle at 80% 30%, rgba(31, 196, 142, .13), transparent 24rem),
      radial-gradient(circle at 50% 100%, rgba(158, 178, 255, .12), transparent 30rem),
      radial-gradient(circle at 52% 48%, rgba(255, 255, 255, .06), transparent 16rem),
      linear-gradient(180deg, #161b27 0%, #070a10 100%);
    z-index: 0;
  }

  .home-ripple:after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(255, 255, 255, .42) 0 1px, transparent 1.4px),
      radial-gradient(circle, rgba(136, 180, 255, .22) 0 1px, transparent 1.7px);
    background-position: 0 0, 38px 54px;
    background-size: 110px 110px, 170px 170px;
    opacity: .34;
    z-index: 0;
  }

  .home-ripple-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  .home-ripple-text {
    position: relative;
    z-index: 2;
    margin: 0;
    font-size: 22px;
    color: rgba(255, 255, 255, .88);
    text-shadow: 0 0 24px rgba(180, 205, 255, .25);
  }
</style>

<style>
  html,
  body {
    overflow: hidden;
  }
</style>

<section class="home-ripple" aria-label="welcome">
  <canvas class="home-ripple-canvas" data-ripple-canvas aria-hidden="true"></canvas>
  <p class="home-ripple-text">hello.</p>
</section>

<script>
(function () {
  var canvas = document.querySelector('[data-ripple-canvas]');
  if (!canvas || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var points = [];
  var raf = null;
  var bounds = null;
  var lastPoint = null;

  function resize() {
    bounds = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, Math.floor(bounds.width * dpr));
    canvas.height = Math.max(1, Math.floor(bounds.height * dpr));
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function addPoint(x, y) {
    var now = performance.now();
    if (lastPoint) {
      var dx = x - lastPoint.x;
      var dy = y - lastPoint.y;
      var distance = Math.sqrt(dx * dx + dy * dy);
      var elapsed = Math.max(16, now - lastPoint.time);
      if (distance < 4) return;
      var speed = Math.min(1, distance / elapsed / 1.15);
    } else {
      var speed = 0.4;
    }
    lastPoint = { x: x, y: y, time: now };
    points.push({ x: x, y: y, born: now, speed: Math.max(0.18, speed) });
    if (points.length > 28) points.shift();
    if (!raf) raf = requestAnimationFrame(draw);
  }

  function smoothPoint(a, b, c, t) {
    var t2 = t * t;
    return {
      x: a.x * (1 - 2 * t + t2) + b.x * (2 * t - 2 * t2) + c.x * t2,
      y: a.y * (1 - 2 * t + t2) + b.y * (2 * t - 2 * t2) + c.y * t2
    };
  }

  function draw() {
    raf = null;
    ctx.clearRect(0, 0, bounds.width, bounds.height);
    ctx.globalCompositeOperation = 'source-over';

    var now = performance.now();
    for (var i = points.length - 1; i >= 0; i -= 1) {
      if (now - points[i].born > 520) {
        points.splice(i, 1);
      }
    }

    if (points.length > 2) {
      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.filter = 'blur(5px)';

      for (var pass = 0; pass < 2; pass += 1) {
        ctx.beginPath();
        var first = points[0];
        ctx.moveTo(first.x, first.y);

        for (var j = 1; j < points.length - 1; j += 1) {
          var prev = points[j - 1];
          var curr = points[j];
          var next = points[j + 1];
          var mid = smoothPoint(prev, curr, next, 0.5);
          ctx.quadraticCurveTo(curr.x, curr.y, mid.x, mid.y);
        }

        var age = Math.min(1, (now - points[0].born) / 520);
        var fade = Math.pow(1 - age, 0.7);
        var recent = points[points.length - 1];
        var speedAlpha = 0.18 + recent.speed * 0.72;
        var width = [22, 7][pass];
        var alpha = [0.26, 0.36][pass] * fade * speedAlpha;
        var gradient = ctx.createLinearGradient(0, 0, bounds.width, bounds.height);
        gradient.addColorStop(0, 'rgba(98, 132, 255,' + alpha + ')');
        gradient.addColorStop(0.48, 'rgba(80, 225, 190,' + (alpha * 0.72) + ')');
        gradient.addColorStop(1, 'rgba(218, 228, 255,' + (alpha * 0.42) + ')');

        ctx.strokeStyle = gradient;
        ctx.lineWidth = width;
        ctx.stroke();
      }
      ctx.restore();
    }

    if (points.length) raf = requestAnimationFrame(draw);
  }

  function handleMove(event) {
    if (!bounds) resize();
    var point = event.touches ? event.touches[0] : event;
    addPoint(point.clientX - bounds.left, point.clientY - bounds.top);
  }

  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('pointermove', handleMove);
  canvas.addEventListener('pointerdown', handleMove);
  canvas.addEventListener('touchmove', handleMove, { passive: true });
}());
</script>
