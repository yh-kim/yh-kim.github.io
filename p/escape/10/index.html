            <span class="meta-badge" data-play-minutes>65분</span>

            <span class="stat-pill"><span>공포도</span><strong>높음</strong></span>

            <div class="poster-frame">
              <img data-image="posterUrl" src="/p/escape/assets/poster-10.jpg" alt="목격자 포스터">
            </div>

          <section class="intro-panel">
