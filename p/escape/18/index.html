        <header class="header">

          </div>
          <p class="header-store" data-field="store">찰리이스케이프</p>
          <div class="header-meta" aria-label="테마 요약">
            <span class="meta-badge" data-field="genre">문제방 / 코믹</span>
            <span class="meta-badge" data-play-minutes>210분</span>
            <span class="meta-badge" data-field="price">각 98,000원</span>
            <a class="meta-badge meta-location" data-link="mapUrl" href="https://map.naver.com/p/entry/place/1241369073" target="_blank" rel="noopener noreferrer" aria-label="네이버 지도 열기" title="네이버 지도 열기">

            <span class="stat-pill"><span>공포도</span><strong>거의 없음</strong></span>

          </div>
        </header>

        <section class="poster-intro" aria-label="포스터와 테마 소개">
          <figure class="poster-panel">
            <div class="poster-frame">
              <img data-image="posterUrl" src="/p/escape/assets/poster-18.jpg" alt="퀴즈카페 포스터">
            </div>
          </figure>

          <section class="intro-panel">
            <div class="intro-copy">
              <span class="section-label">테마 소개</span>
