---
layout: page
title: Note
description: ""
header-img: "img/about-bg.jpg"
sidebar: false
space-header: true
html-document-tags: true
---

{% assign documents = site.data.html_documents | sort: "date" | reverse %}

{% for document in documents %}
<form class="post-preview-form" action="{{ document.path | relative_url }}" method="get" data-document-card data-tags="{% if document.tags %}{{ document.tags | join: '|' | escape }}{% endif %}">
    <button class="post-preview" type="submit" aria-label="{{ document.title | escape }}">
    <span class="post-title">
        {{ document.title }}
    </span>
    {% if document.description %}
    <span class="post-subtitle">
        {{ document.description }}
    </span>
    {% endif %}
    <span class="post-content-preview">
        {% if document.tags %}{{ document.tags | join: " · " }}{% else %}HTML Document{% endif %}
    </span>
    <span class="post-meta">
        {% if document.date %}{{ document.date | date: "%B %-d, %Y" }}{% endif %}
    </span>
    </button>
</form>
<hr>
{% endfor %}

<p class="note-filter-empty" data-note-filter-empty hidden>선택한 태그에 해당하는 문서가 없습니다.</p>

<script>
  (function () {
    function initNoteFilters() {
      var buttons = Array.prototype.slice.call(document.querySelectorAll("[data-doc-filter]"));
      var cards = Array.prototype.slice.call(document.querySelectorAll("[data-document-card]"));
      var empty = document.querySelector("[data-note-filter-empty]");
      var tagPanels = Array.prototype.slice.call(document.querySelectorAll(".note-document-tag-panel"));
      var knownFilters = buttons.map(function (button) {
        return button.getAttribute("data-doc-filter");
      });

      function selectedFromHash() {
        var raw = window.location.hash ? window.location.hash.slice(1) : "";
        if (!raw) return "all";

        try {
          raw = decodeURIComponent(raw);
        } catch (error) {
          raw = "all";
        }

        return knownFilters.indexOf(raw) !== -1 ? raw : "all";
      }

      function setActive(selected) {
        buttons.forEach(function (button) {
          var active = button.getAttribute("data-doc-filter") === selected;
          button.classList.toggle("is-active", active);
          button.setAttribute("aria-pressed", active ? "true" : "false");
        });
      }

      function applyFilter(selected) {
        var shown = 0;
        cards.forEach(function (card) {
          var tagValue = card.getAttribute("data-tags") || "";
          var tags = tagValue ? tagValue.split("|") : [];
          var visible = selected === "all" || tags.indexOf(selected) !== -1 || (selected === "Etc" && tags.length === 0);
          card.hidden = !visible;
          if (visible) shown += 1;
        });
        if (empty) empty.hidden = shown !== 0;
        setActive(selected);
      }

      buttons.forEach(function (button) {
        button.addEventListener("click", function (event) {
          var selected = button.getAttribute("data-doc-filter") || "all";
          if (selected === "all") {
            event.preventDefault();
            if (window.location.hash) {
              history.pushState(null, "", window.location.pathname + window.location.search);
            }
          }
          applyFilter(selected);
        });
      });

      tagPanels.forEach(function (panel) {
        var toggle = panel.querySelector("[data-note-tag-toggle]");
        var tagList = panel.querySelector(".note-document-tags");
        if (!toggle) return;

        function updateToggleVisibility() {
          if (!tagList) return;

          var shouldShow = tagList.scrollWidth > tagList.clientWidth + 1 || panel.classList.contains("is-expanded");
          panel.classList.toggle("has-overflow", shouldShow);
          toggle.hidden = !shouldShow;
        }

        toggle.addEventListener("click", function () {
          var expanded = !panel.classList.contains("is-expanded");
          panel.classList.toggle("is-expanded", expanded);
          toggle.setAttribute("aria-expanded", expanded ? "true" : "false");
          toggle.setAttribute("aria-label", expanded ? "태그 접기" : "태그 펼치기");
          toggle.textContent = expanded ? "▴" : "▾";
          updateToggleVisibility();
        });

        updateToggleVisibility();
        window.addEventListener("resize", updateToggleVisibility);
      });

      window.addEventListener("hashchange", function () {
        applyFilter(selectedFromHash());
      });

      applyFilter(selectedFromHash());
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initNoteFilters);
    } else {
      initNoteFilters();
    }
  })();
</script>
